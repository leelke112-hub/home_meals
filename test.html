<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>실시간 공유 식단 캘린더</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

*{box-sizing:border-box;}

body{
    margin:0;
    padding:16px;
    font-family:'Pretendard',sans-serif;
    background:linear-gradient(135deg,#fff7f0,#f4f0ff);
    color:#444;
    display:grid;
    grid-template-columns:280px 1fr 280px;
    gap:16px;
    min-height:100vh;
}

.panel{
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(10px);
    border-radius:24px;
    padding:18px;
    overflow-y:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{margin-top:0;}

button{
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

button:hover{transform:translateY(-2px);}

input, textarea, select{
    width:100%;
    border:none;
    border-radius:12px;
    padding:10px;
    margin-bottom:10px;
    background:white;
}

.inventory-item{
    background:white;
    border-radius:12px;
    padding:10px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
}

.cell{
    position:relative;
    height:120px;
    border-radius:18px;
    overflow:hidden;
    background:white;
    cursor:pointer;
}

.cell.empty{
    opacity:0;
    pointer-events:none;
}

.cell-bg{
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
}

.cell-overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom,rgba(0,0,0,0.1),rgba(0,0,0,0.3));
}

.cell-content{
    position:relative;
    z-index:2;
    height:100%;
    padding:8px;
    display:flex;
    flex-direction:column;
}

.date{
    color:white;
    font-weight:800;
    font-size:17px;
    text-shadow:0 2px 6px rgba(0,0,0,0.8);
}

.meal-tag{
    margin-top:auto;
    background:rgba(255,255,255,0.85);
    padding:6px;
    border-radius:10px;
    text-align:center;
    font-size:12px;
}

.modal{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:360px;
    max-height:90vh;
    overflow-y:auto;
    background:white;
    border-radius:24px;
    padding:20px;
    z-index:100;
}

.modal.active{display:block;}

.overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:99;
}

.overlay.active{display:block;}

#photo-preview{
    width:100%;
    border-radius:16px;
    display:none;
    margin-top:10px;
}

.weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    margin-bottom:10px;
    text-align:center;
    font-weight:bold;
}

@media(max-width:1200px){
    body{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="panel">

<h2>🧂 식재료 관리</h2>

<div style="display:flex; gap:8px;">
<input id="new-item-name" placeholder="예: 계란 6, 간장">
<button onclick="addInventory()" style="background:#7c5cff;color:white;padding:0 16px;">추가</button>
</div>

<h3>식재료 현황</h3>
<ul id="inventory-list"></ul>

</div>

<div class="panel">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
<button onclick="changeMonth(-1)" style="background:#7c5cff;color:white;padding:10px;">◀</button>
<h2 id="month-title"></h2>
<button onclick="changeMonth(1)" style="background:#7c5cff;color:white;padding:10px;">▶</button>
</div>

<div class="weekdays">
<div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
</div>

<div class="grid" id="calendar-grid"></div>

</div>

<div class="panel">

<h2>🍽 식단 히스토리</h2>

<select id="history-sort" onchange="renderHistory()">
<option value="latest">최신순</option>
<option value="star">별점순</option>
</select>

<input id="ingredient-search" placeholder="식재료 검색" onkeyup="renderHistory()">

<ul id="history-list"></ul>

</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>

<div class="modal" id="meal-modal">

<h3 id="modal-date-title"></h3>

<input type="hidden" id="modal-date">

<input id="modal-menu" placeholder="오늘 메뉴">

<textarea id="modal-memo" rows="3" placeholder="메모"></textarea>

<input id="modal-ingredients" placeholder="예: 계란 2, 간장">

<input type="file" id="meal-photo" accept="image/*">

<img id="photo-preview">

<div style="display:flex;gap:8px;margin-top:10px;">
<button onclick="saveMeal()" style="flex:2;background:#7c5cff;color:white;padding:12px;">저장</button>
<button onclick="deleteMeal()" style="flex:1;background:#ff6b6b;color:white;padding:12px;">삭제</button>
</div>

</div>

<script>

const SUPABASE_URL = 'https://utmjozwjgmhhrpyuqrpt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Sxo_yAhHLwmxBcUeGjatdQ_ZPgjwD3o';

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let currentPhotoData = '';

let appData = {
    meals:{},
    inventory:{}
};

async function loadMeals(){

    const { data } =
    await supabase
    .from('meals')
    .select('*');

    appData.meals = {};

    if(data){

        data.forEach(item=>{

            appData.meals[item.date] = {

                menu:item.menu,
                memo:item.memo,
                ingredients:item.ingredients
                    ? item.ingredients.split(',')
                    : [],
                photo:item.photo,
                star:item.star || 0
            };
        });
    }

    updateAllViews();
}

function parseIngredient(str){

    const match =
    str.match(/^(.*?)\s*(\d+)\s*(개|g|봉|ml)?$/i);

    return match
    ? {
        name:match[1].trim(),
        qty:parseInt(match[2]),
        hasNumber:true
    }
    : {
        name:str.trim(),
        qty:1,
        hasNumber:false
    };
}

function addInventory(){

    const val =
    document.getElementById('new-item-name')
    .value.trim();

    if(!val) return;

    const parsed = parseIngredient(val);

    if(!parsed.hasNumber){

        appData.inventory[parsed.name] = "infinite";

    }else{

        appData.inventory[parsed.name] =
        (appData.inventory[parsed.name] || 0)
        + parsed.qty;
    }

    renderInventory();

    document.getElementById('new-item-name').value='';
}

function renderInventory(){

    const list =
    document.getElementById('inventory-list');

    list.innerHTML='';

    for(let i in appData.inventory){

        const value = appData.inventory[i];

        list.innerHTML += `
        <li class="inventory-item">

            <span>
            ${value==="infinite" ? "🧂" : "📦"}
            ${i}
            ${value==="infinite" ? "" : "(" + value + ")"}
            </span>

            <button
            onclick="removeInventory('${i}')"
            style="background:#ff6b6b;color:white;padding:4px 8px;">

            삭제

            </button>

        </li>
        `;
    }
}

function removeInventory(item){

    delete appData.inventory[item];

    renderInventory();
}

function updateAllViews(){

    renderCalendar();
    renderHistory();
    renderInventory();
}

function changeMonth(offset){

    currentMonth += offset;

    if(currentMonth < 0){

        currentMonth = 11;
        currentYear--;

    }else if(currentMonth > 11){

        currentMonth = 0;
        currentYear++;
    }

    renderCalendar();
}

function renderCalendar(){

    const grid =
    document.getElementById('calendar-grid');

    grid.innerHTML='';

    document.getElementById('month-title')
    .innerText =
    `${currentYear}년 ${currentMonth+1}월`;

    const firstDay =
    new Date(currentYear,currentMonth,1).getDay();

    const days =
    new Date(currentYear,currentMonth+1,0).getDate();

    for(let i=0;i<firstDay;i++){

        const empty =
        document.createElement('div');

        empty.className='cell empty';

        grid.appendChild(empty);
    }

    for(let i=1;i<=days;i++){

        const dateStr =
        `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

        const meal =
        appData.meals[dateStr];

        const cell =
        document.createElement('div');

        cell.className='cell';

        cell.onclick =
        ()=>openModal(dateStr);

        let bg='';

        if(meal && meal.photo){

            bg = `
            <div class="cell-bg"
            style="background-image:url('${meal.photo}')">
            </div>

            <div class="cell-overlay"></div>
            `;
        }

        cell.innerHTML = `
        ${bg}

        <div class="cell-content">

            <div class="date">${i}</div>

            ${meal ? `
            <div class="meal-tag">
                ${meal.menu}
                <div style="color:#ffc107;">
                    ${'★'.repeat(meal.star || 0)}
                </div>
            </div>
            ` : ''}

        </div>
        `;

        grid.appendChild(cell);
    }
}

function openModal(date){

    document.getElementById('overlay')
    .classList.add('active');

    document.getElementById('meal-modal')
    .classList.add('active');

    document.getElementById('modal-date-title')
    .innerText = `${date} 식단`;

    document.getElementById('modal-date')
    .value = date;

    const meal =
    appData.meals[date];

    document.getElementById('modal-menu')
    .value = meal ? meal.menu : '';

    document.getElementById('modal-memo')
    .value = meal ? meal.memo : '';

    document.getElementById('modal-ingredients')
    .value = meal
        ? meal.ingredients.join(', ')
        : '';

    currentPhotoData =
    meal?.photo || '';

    const preview =
    document.getElementById('photo-preview');

    if(currentPhotoData){

        preview.src = currentPhotoData;
        preview.style.display='block';

    }else{

        preview.style.display='none';
    }

    document.getElementById('meal-photo').value='';
}

function closeModal(){

    document.getElementById('overlay')
    .classList.remove('active');

    document.getElementById('meal-modal')
    .classList.remove('active');
}

document.getElementById('meal-photo')
.addEventListener('change', async function(e){

    const file = e.target.files[0];

    if(!file) return;

    const fileName =
    Date.now() + '_' + file.name;

    const { error } =
    await supabase.storage
    .from('foods')
    .upload(fileName, file);

    if(error){

        alert('Storage 업로드 실패');
        return;
    }

    const { data } =
    supabase.storage
    .from('foods')
    .getPublicUrl(fileName);

    currentPhotoData =
    data.publicUrl;

    const preview =
    document.getElementById('photo-preview');

    preview.src =
    currentPhotoData;

    preview.style.display='block';
});

async function saveMeal(){

    const date =
    document.getElementById('modal-date')
    .value;

    const menu =
    document.getElementById('modal-menu')
    .value.trim();

    if(!menu){

        alert('메뉴를 입력해줘!');
        return;
    }

    const ing =
    document.getElementById('modal-ingredients')
    .value
    .split(',')
    .map(v=>v.trim())
    .filter(Boolean);

    await supabase
    .from('meals')
    .upsert({

        date:date,
        menu:menu,

        memo:
        document.getElementById('modal-memo')
        .value,

        ingredients:ing.join(','),

        photo:currentPhotoData,

        star:
        appData.meals[date]?.star || 0

    });

    closeModal();

    loadMeals();
}

async function deleteMeal(){

    const date =
    document.getElementById('modal-date')
    .value;

    await supabase
    .from('meals')
    .delete()
    .eq('date',date);

    closeModal();

    loadMeals();
}

function renderHistory(){

    const list =
    document.getElementById('history-list');

    list.innerHTML='';

    const search =
    document.getElementById('ingredient-search')
    .value.trim();

    const sort =
    document.getElementById('history-sort')
    .value;

    let meals =
    Object.entries(appData.meals);

    if(search){

        meals = meals.filter(([d,m])=>

            m.ingredients.some(i=>

                i.includes(search)
            )
        );
    }

    if(sort === 'star'){

        meals.sort((a,b)=>
            b[1].star - a[1].star
        );

    }else{

        meals.sort((a,b)=>
            b[0].localeCompare(a[0])
        );
    }

    meals.forEach(([date,m])=>{

        list.innerHTML += `
        <li class="inventory-item" style="display:block;">

            <strong>${date}</strong>

            <div style="margin-top:5px;">
                🍽 ${m.menu}
            </div>

            <div style="color:#ffc107;">
                ${'★'.repeat(m.star || 0)}
            </div>

            <div style="
            font-size:12px;
            color:#777;
            margin-top:6px;">

            ${m.ingredients.join(', ')}

            </div>

        </li>
        `;
    });
}

supabase
.channel('realtime-meals')
.on(
'postgres_changes',
{
    event:'*',
    schema:'public',
    table:'meals'
},
()=>{

    loadMeals();

})
.subscribe();

loadMeals();

</script>


<script>
window.addEventListener('error',e=>{
 console.log(e.error);
});
if(!window.supabase){
 document.body.innerHTML="<div style='padding:30px;font-family:sans-serif'>Supabase 라이브러리 로드 실패. GitHub Pages/Netlify로 열거나 인터넷 연결 확인.</div>"
}
</script>
</body>
</html>
