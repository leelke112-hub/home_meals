<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공유 식단 캘린더</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{
margin:0;
padding:20px;
font-family:sans-serif;
background:linear-gradient(135deg,#fff6f0,#f2efff);
color:#333;
}
.container{
display:grid;
grid-template-columns:260px 1fr 300px;
gap:16px;
}
.panel{
background:white;
border-radius:20px;
padding:16px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}
h1,h2,h3{margin-top:0}
#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}
.day{
height:120px;
border-radius:16px;
overflow:hidden;
position:relative;
background:#fff;
cursor:pointer;
border:1px solid #eee;
}
.bg{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
filter:brightness(0.85);
}
.overlay{
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,0.05),rgba(0,0,0,0.5));
}
.content{
position:relative;
z-index:2;
height:100%;
padding:8px;
display:flex;
flex-direction:column;
}
.date{
font-weight:800;
font-size:18px;
color:white;
text-shadow:0 2px 5px rgba(0,0,0,1);
}
.meal{
margin-top:auto;
background:rgba(255,255,255,0.88);
padding:6px;
border-radius:10px;
font-size:12px;
font-weight:bold;
}
.week{
display:grid;
grid-template-columns:repeat(7,1fr);
text-align:center;
margin-bottom:10px;
font-weight:bold;
}
input,textarea,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:10px;
}
button{
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
}
.inventory-item,.history-item{
background:#fafafa;
padding:10px;
border-radius:12px;
margin-bottom:8px;
}
.modal{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
width:360px;
max-height:90vh;
overflow:auto;
padding:20px;
border-radius:20px;
z-index:100;
}
.modal.active{display:block}
.backdrop{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
z-index:99;
}
.backdrop.active{display:block}
#preview{
width:100%;
border-radius:12px;
display:none;
margin-bottom:10px;
}
@media(max-width:1100px){
.container{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<h1>🍽 공유 식단 캘린더</h1>

<div class="container">

<div class="panel">
<h2>🧂 식재료 현황</h2>

<div style="display:flex;gap:8px;">
<input id="inventoryInput" placeholder="예: 계란 3 / 간장">
<button onclick="addInventory()" style="background:#7c5cff;color:white;">추가</button>
</div>

<div id="inventoryList"></div>
</div>

<div class="panel">

<div style="display:flex;justify-content:space-between;align-items:center;">
<button onclick="changeMonth(-1)">◀</button>
<h2 id="monthTitle"></h2>
<button onclick="changeMonth(1)">▶</button>
</div>

<div class="week">
<div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
</div>

<div id="calendar"></div>

</div>

<div class="panel">
<h2>📜 식단 히스토리</h2>

<select id="sortSelect" onchange="renderHistory()">
<option value="latest">최신순</option>
<option value="star">별점순</option>
</select>

<input id="searchInput" placeholder="재료 검색" onkeyup="renderHistory()">

<div id="history"></div>
</div>

</div>

<div class="backdrop" id="backdrop" onclick="closeModal()"></div>

<div class="modal" id="modal">

<h3 id="modalDate"></h3>

<input id="mealName" placeholder="메뉴 이름">

<textarea id="mealMemo" placeholder="레시피 / 메모"></textarea>

<input id="mealIngredients" placeholder="재료 예: 계란2, 간장">

<select id="mealStar">
<option value="0">별점 선택</option>
<option value="1">★</option>
<option value="2">★★</option>
<option value="3">★★★</option>
<option value="4">★★★★</option>
<option value="5">★★★★★</option>
</select>

<input type="file" id="mealPhoto" accept="image/*">

<img id="preview">

<button onclick="saveMeal()" style="width:100%;background:#7c5cff;color:white;margin-bottom:8px;">저장</button>
<button onclick="deleteMeal()" style="width:100%;background:#ff6b6b;color:white;">삭제</button>

</div>

<script>

const SUPABASE_URL = "https://utmjozwjgmhhrpyuqrpt.supabase.co";
const SUPABASE_KEY = "sb_publishable_Sxo_yAhHLwmxBcUeGjatdQ_ZPgjwD3o";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let appData = {
inventory:{},
meals:{}
};

let currentPhoto = "";
let selectedDate = "";

let year = new Date().getFullYear();
let month = new Date().getMonth();

function parseIngredient(str){

const m = str.match(/^(.*?)\s*(\d+)$/);

if(m){
return {
name:m[1].trim(),
qty:Number(m[2]),
infinite:false
};
}

return {
name:str.trim(),
qty:"∞",
infinite:true
};

}

async function saveDB(){

const { error } =
await supabaseClient
.from("meal_calendar")
.upsert(
[
{
date:"shared",
data:JSON.stringify(appData)
}
],
{
onConflict:"date"
}
);

if(error){
console.error(error);
alert("DB 저장 실패");
}

}

async function loadDB(){

const { data, error } =
await supabaseClient
.from("meal_calendar")
.select("*")
.eq("date","shared")
.single();

if(error && error.code !== "PGRST116"){
console.error(error);
}

if(data?.data){

try{
appData = JSON.parse(data.data);
}catch(e){}

}

renderAll();

}

function renderAll(){
renderInventory();
renderCalendar();
renderHistory();
}

function addInventory(){

const val =
document.getElementById("inventoryInput")
.value.trim();

if(!val) return;

const parsed = parseIngredient(val);

if(parsed.infinite){

appData.inventory[parsed.name] = "∞";

}else{

appData.inventory[parsed.name] =
(appData.inventory[parsed.name] || 0)
+ parsed.qty;

}

document.getElementById("inventoryInput").value="";

renderInventory();
saveDB();

}

function removeInventory(name){

delete appData.inventory[name];

renderInventory();
saveDB();

}

function renderInventory(){

const wrap =
document.getElementById("inventoryList");

wrap.innerHTML="";

Object.entries(appData.inventory)
.forEach(([name,val])=>{

wrap.innerHTML += `
<div class="inventory-item">
<b>${name}</b>
${val==="∞" ? "" : `(${val})`}
<button
style="float:right;background:#eee;"
onclick="removeInventory('${name}')">
삭제
</button>
</div>
`;

});

}

function changeMonth(v){

month += v;

if(month<0){
month=11;
year--;
}

if(month>11){
month=0;
year++;
}

renderCalendar();

}

function renderCalendar(){

document.getElementById("monthTitle")
.innerText =
`${year}년 ${month+1}월`;

const cal =
document.getElementById("calendar");

cal.innerHTML="";

const first =
new Date(year,month,1).getDay();

const last =
new Date(year,month+1,0).getDate();

for(let i=0;i<first;i++){

const empty =
document.createElement("div");

empty.style.visibility="hidden";

cal.appendChild(empty);

}

for(let d=1; d<=last; d++){

const date =
`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

const meal =
appData.meals[date];

const div =
document.createElement("div");

div.className="day";

let bg="";

if(meal?.photo){

bg = `
<div class="bg"
style="background-image:url('${meal.photo}')"></div>
<div class="overlay"></div>
`;

}

div.innerHTML = `
${bg}

<div class="content">

<div class="date">${d}</div>

${meal ? `
<div class="meal">
${meal.name}
<br>
<span style="color:#ffb400;">
${"★".repeat(meal.star || 0)}
</span>
</div>
` : ""}

</div>
`;

div.onclick=()=>openModal(date);

cal.appendChild(div);

}

}

function openModal(date){

selectedDate = date;

document.getElementById("modal")
.classList.add("active");

document.getElementById("backdrop")
.classList.add("active");

document.getElementById("modalDate")
.innerText = date;

const meal =
appData.meals[date];

document.getElementById("mealName")
.value = meal?.name || "";

document.getElementById("mealMemo")
.value = meal?.memo || "";

document.getElementById("mealIngredients")
.value =
meal?.ingredients?.join(", ") || "";

document.getElementById("mealStar")
.value = meal?.star || 0;

currentPhoto = meal?.photo || "";

const preview =
document.getElementById("preview");

if(currentPhoto){

preview.src = currentPhoto;
preview.style.display="block";

}else{

preview.style.display="none";

}

document.getElementById("mealPhoto").value="";

}

function closeModal(){

document.getElementById("modal")
.classList.remove("active");

document.getElementById("backdrop")
.classList.remove("active");

}

document.getElementById("mealPhoto")
.addEventListener("change",e=>{

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = ()=>{

currentPhoto = reader.result;

const preview =
document.getElementById("preview");

preview.src = currentPhoto;
preview.style.display="block";

};

reader.readAsDataURL(file);

});

async function saveMeal(){

const name =
document.getElementById("mealName")
.value.trim();

if(!name){
alert("메뉴 입력");
return;
}

const ingredients =
document.getElementById("mealIngredients")
.value
.split(",")
.map(v=>v.trim())
.filter(Boolean);

ingredients.forEach(i=>{

const parsed = parseIngredient(i);

if(appData.inventory[parsed.name]===undefined){
return;
}

if(appData.inventory[parsed.name]==="∞"){
return;
}

if(parsed.infinite){
return;
}

appData.inventory[parsed.name] -= parsed.qty;

if(appData.inventory[parsed.name] <= 0){
delete appData.inventory[parsed.name];
}

});

appData.meals[selectedDate] = {
name:name,
memo:document.getElementById("mealMemo").value,
ingredients:ingredients,
star:Number(document.getElementById("mealStar").value),
photo:currentPhoto
};

renderAll();
closeModal();

await saveDB();

}

async function deleteMeal(){

delete appData.meals[selectedDate];

renderAll();
closeModal();

await saveDB();

}

function renderHistory(){

const wrap =
document.getElementById("history");

wrap.innerHTML="";

let meals =
Object.entries(appData.meals);

const search =
document.getElementById("searchInput")
.value.trim();

if(search){

meals = meals.filter(([d,m])=>
m.ingredients.some(i=>i.includes(search))
);

}

const sort =
document.getElementById("sortSelect").value;

if(sort==="star"){

meals.sort((a,b)=>
(b[1].star||0)-(a[1].star||0)
);

}else{

meals.sort((a,b)=>
b[0].localeCompare(a[0])
);

}

meals.forEach(([date,m])=>{

wrap.innerHTML += `
<div class="history-item">
<b>${date}</b>
<div>🍽 ${m.name}</div>
<div style="color:#ffb400;">
${"★".repeat(m.star || 0)}
</div>
<div style="font-size:12px;color:#666;">
${m.ingredients.join(", ")}
</div>
</div>
`;

});

}

loadDB();

</script>

</body>
</html>
