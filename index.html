<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공유 식단 캘린더</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#f6f3ff;
padding:15px;
display:grid;
grid-template-columns:260px 1fr 260px;
gap:15px;
}

.panel{
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.cell{
height:120px;
border-radius:18px;
overflow:hidden;
position:relative;
background:#fff;
cursor:pointer;
border:1px solid #eee;
}

.cell-bg{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
}

.cell-overlay{
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,0.1),rgba(0,0,0,0.45));
}

.cell-content{
position:relative;
z-index:2;
height:100%;
padding:8px;
display:flex;
flex-direction:column;
}

.date{
font-size:18px;
font-weight:800;
color:white;
text-shadow:0 2px 5px rgba(0,0,0,0.9);
}

.meal{
margin-top:auto;
background:rgba(255,255,255,0.85);
padding:6px;
border-radius:10px;
font-size:12px;
font-weight:bold;
}

.empty{
opacity:0;
pointer-events:none;
}

button{
border:none;
border-radius:10px;
padding:10px;
cursor:pointer;
}

input,textarea,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:10px;
}

.modal{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
width:350px;
max-height:90vh;
overflow:auto;
padding:20px;
border-radius:20px;
z-index:100;
}

.modal.active{display:block;}

.overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.45);
z-index:99;
}

.overlay.active{display:block;}

.week{
display:grid;
grid-template-columns:repeat(7,1fr);
margin-bottom:10px;
font-weight:bold;
text-align:center;
}

#photo-preview{
width:100%;
border-radius:12px;
display:none;
margin-top:10px;
}

.inventory-item{
display:flex;
justify-content:space-between;
background:#fafafa;
padding:8px;
border-radius:10px;
margin-bottom:6px;
}

@media(max-width:1200px){
body{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div class="panel">
<h2>🧂 식재료 현황</h2>

<div style="display:flex;gap:8px;">
<input id="new-item" placeholder="예: 계란 6, 간장">
<button onclick="addInventory()" style="background:#7c5cff;color:white;">추가</button>
</div>

<div id="inventory-list"></div>
</div>

<div class="panel">

<div style="display:flex;justify-content:space-between;align-items:center;">
<button onclick="changeMonth(-1)">◀</button>
<h2 id="month-title"></h2>
<button onclick="changeMonth(1)">▶</button>
</div>

<div class="week">
<div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
</div>

<div class="grid" id="calendar"></div>

</div>

<div class="panel">

<h2>🍽 식단 히스토리</h2>

<select id="sort" onchange="renderHistory()">
<option value="latest">최신순</option>
<option value="star">별점순</option>
</select>

<input id="search" placeholder="재료 검색" onkeyup="renderHistory()">

<div id="history"></div>

</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>

<div class="modal" id="modal">

<h3 id="modal-title"></h3>

<input id="meal-name" placeholder="메뉴">

<textarea id="meal-memo" placeholder="메모"></textarea>

<input id="meal-ingredients" placeholder="예: 계란 2, 간장">

<input type="file" id="meal-photo" accept="image/*">

<img id="photo-preview">

<div style="display:flex;gap:8px;margin-top:10px;">
<button onclick="saveMeal()" style="flex:1;background:#7c5cff;color:white;">저장</button>
<button onclick="deleteMeal()" style="flex:1;background:#ff6b6b;color:white;">삭제</button>
</div>

</div>

<script>

const SUPABASE_URL = "https://utmjozwjgmhhrpyuqrpt.supabase.co";
const SUPABASE_KEY = "sb_publishable_Sxo_yAhHLwmxBcUeGjatdQ_ZPgjwD3o";

let supabase=null;

try{
supabase = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);
}catch(e){
console.log(e);
}

let year = new Date().getFullYear();
let month = new Date().getMonth();

let selectedDate="";
let currentPhoto="";

let dataStore={
meals:{},
inventory:{}
};

function saveLocal(){
localStorage.setItem(
"meal-calendar-data",
JSON.stringify(dataStore)
);
}

function loadLocal(){

const saved =
localStorage.getItem("meal-calendar-data");

if(saved){
dataStore = JSON.parse(saved);
}
}

async function loadSupabase(){

if(!supabase){
loadLocal();
renderAll();
return;
}

try{

const {data,error} =
await supabase
.from("meals")
.select("*");

if(error) throw error;

dataStore.meals={};

data.forEach(v=>{

dataStore.meals[v.date]={
menu:v.menu || "",
memo:v.memo || "",
ingredients:v.ingredients
? v.ingredients.split(",")
: [],
photo:v.photo || "",
star:v.star || 0
};

});

renderAll();

}catch(err){

console.log(err);

loadLocal();
renderAll();
}
}

function renderAll(){
renderCalendar();
renderInventory();
renderHistory();
}

function parseIngredient(str){

const match =
str.match(/^(.*?)\s*(\d+)$/);

if(match){

return{
name:match[1].trim(),
qty:Number(match[2]),
infinite:false
};
}

return{
name:str.trim(),
qty:9999,
infinite:true
};
}

function addInventory(){

const val =
document.getElementById("new-item")
.value.trim();

if(!val) return;

const parsed =
parseIngredient(val);

if(parsed.infinite){

dataStore.inventory[parsed.name]="∞";

}else{

dataStore.inventory[parsed.name] =
(dataStore.inventory[parsed.name] || 0)
+ parsed.qty;
}

saveLocal();
renderInventory();

document.getElementById("new-item").value="";
}

function removeInventory(name){

delete dataStore.inventory[name];

saveLocal();
renderInventory();
}

function renderInventory(){

const wrap =
document.getElementById("inventory-list");

wrap.innerHTML="";

Object.keys(dataStore.inventory)
.forEach(name=>{

const val =
dataStore.inventory[name];

wrap.innerHTML += `
<div class="inventory-item">

<div>
${name}
${val==="∞" ? "" : `(${val})`}
</div>

<button onclick="removeInventory('${name}')">
삭제
</button>

</div>
`;
});
}

function changeMonth(v){

month += v;

if(month<0){
month=11;
year--;
}

if(month>11){
month=0;
year++;
}

renderCalendar();
}

function renderCalendar(){

const grid =
document.getElementById("calendar");

grid.innerHTML="";

document.getElementById("month-title")
.innerText =
`${year}년 ${month+1}월`;

const first =
new Date(year,month,1).getDay();

const last =
new Date(year,month+1,0).getDate();

for(let i=0;i<first;i++){

const empty =
document.createElement("div");

empty.className="cell empty";

grid.appendChild(empty);
}

for(let d=1; d<=last; d++){

const date =
`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

const meal =
dataStore.meals[date];

const div =
document.createElement("div");

div.className="cell";

div.onclick=()=>openModal(date);

let bg="";

if(meal?.photo){

bg=`
<div class="cell-bg"
style="background-image:url('${meal.photo}')"></div>
<div class="cell-overlay"></div>
`;
}

div.innerHTML=`
${bg}

<div class="cell-content">

<div class="date">${d}</div>

${meal ? `
<div class="meal">
${meal.menu}
<br>
<span style="color:#ffb400;">
${"★".repeat(meal.star || 0)}
</span>
</div>
` : ""}

</div>
`;

grid.appendChild(div);
}
}

function openModal(date){

selectedDate=date;

document.getElementById("overlay")
.classList.add("active");

document.getElementById("modal")
.classList.add("active");

document.getElementById("modal-title")
.innerText = date;

const meal =
dataStore.meals[date];

document.getElementById("meal-name")
.value = meal?.menu || "";

document.getElementById("meal-memo")
.value = meal?.memo || "";

document.getElementById("meal-ingredients")
.value = meal?.ingredients?.join(", ") || "";

currentPhoto = meal?.photo || "";

const preview =
document.getElementById("photo-preview");

if(currentPhoto){

preview.src=currentPhoto;
preview.style.display="block";

}else{

preview.style.display="none";
}

document.getElementById("meal-photo").value="";
}

function closeModal(){

document.getElementById("overlay")
.classList.remove("active");

document.getElementById("modal")
.classList.remove("active");
}

document.getElementById("meal-photo")
.addEventListener("change",async e=>{

const file = e.target.files[0];

if(!file) return;

if(!supabase){

const reader = new FileReader();

reader.onload = ()=>{
currentPhoto = reader.result;

document.getElementById("photo-preview")
.src = currentPhoto;

document.getElementById("photo-preview")
.style.display="block";
};

reader.readAsDataURL(file);

return;
}

const fileName =
Date.now()+"_"+file.name;

const {error} =
await supabase.storage
.from("foods")
.upload(fileName,file);

if(error){

alert("스토리지 업로드 실패");
return;
}

const {data} =
supabase.storage
.from("foods")
.getPublicUrl(fileName);

currentPhoto = data.publicUrl;

document.getElementById("photo-preview")
.src = currentPhoto;

document.getElementById("photo-preview")
.style.display="block";
});

async function saveMeal(){

const menu =
document.getElementById("meal-name")
.value.trim();

if(!menu){
alert("메뉴 입력");
return;
}

const ingredients =
document.getElementById("meal-ingredients")
.value
.split(",")
.map(v=>v.trim())
.filter(Boolean);

dataStore.meals[selectedDate]={
menu,
memo:document.getElementById("meal-memo").value,
ingredients,
photo:currentPhoto,
star:dataStore.meals[selectedDate]?.star || 0
};

saveLocal();

if(supabase){

try{

await supabase
.from("meals")
.upsert({
date:selectedDate,
menu,
memo:dataStore.meals[selectedDate].memo,
ingredients:ingredients.join(","),
photo:currentPhoto,
star:dataStore.meals[selectedDate].star
});

}catch(err){
console.log(err);
}
}

renderAll();
closeModal();
}

async function deleteMeal(){

delete dataStore.meals[selectedDate];

saveLocal();

if(supabase){

try{

await supabase
.from("meals")
.delete()
.eq("date",selectedDate);

}catch(err){
console.log(err);
}
}

renderAll();
closeModal();
}

function renderHistory(){

const wrap =
document.getElementById("history");

wrap.innerHTML="";

let meals =
Object.entries(dataStore.meals);

const search =
document.getElementById("search")
.value.trim();

if(search){

meals = meals.filter(([d,m])=>
m.ingredients.some(i=>i.includes(search))
);
}

const sort =
document.getElementById("sort").value;

if(sort==="star"){

meals.sort((a,b)=>
(b[1].star||0)-(a[1].star||0)
);

}else{

meals.sort((a,b)=>
b[0].localeCompare(a[0])
);
}

meals.forEach(([date,m])=>{

wrap.innerHTML += `
<div class="inventory-item" style="display:block;">

<b>${date}</b>

<div>🍽 ${m.menu}</div>

<div style="color:#ffb400;">
${"★".repeat(m.star || 0)}
</div>

<div style="font-size:12px;color:#777;">
${m.ingredients.join(", ")}
</div>

</div>
`;
});
}

loadSupabase();

</script>
</body>
</html>
