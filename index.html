
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공유 식단 캘린더</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;background:#f5f3ff;padding:20px;margin:0}
#calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.day{background:white;border-radius:16px;height:120px;padding:8px;position:relative;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.bg{position:absolute;inset:0;background-size:cover;background-position:center}
.overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.1),rgba(0,0,0,0.5))}
.content{position:relative;z-index:2;color:white;font-weight:bold;text-shadow:0 2px 5px rgba(0,0,0,0.9)}
.modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:20px;width:320px;z-index:10}
.modal.active{display:block}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9}
.backdrop.active{display:block}
button{padding:10px 14px;border:none;border-radius:10px;cursor:pointer}
#preview{width:100%;border-radius:12px;display:none;margin-bottom:10px}
</style>
</head>
<body>

<h1>🍽 공유 식단 캘린더</h1>

<div id="calendar"></div>

<div class="backdrop" id="backdrop"></div>

<div class="modal" id="modal">
<h3 id="modalDate"></h3>

<input id="mealInput" placeholder="메뉴 이름" style="width:100%;margin-bottom:10px;padding:10px;box-sizing:border-box">

<input type="file" id="photoInput" accept="image/*" style="margin-bottom:10px">

<img id="preview">

<div style="display:flex;gap:8px;">
<button onclick="saveMeal()" style="background:#7c5cff;color:white;">저장</button>
<button onclick="closeModal()">닫기</button>
</div>
</div>

<script>

const SUPABASE_URL = "https://utmjozwjgmhhrpyuqrpt.supabase.co";
const SUPABASE_KEY = "sb_publishable_Sxo_yAhHLwmxBcUeGjatdQ_ZPgjwD3o";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let meals = {};
let selectedDate = "";
let currentPhoto = "";

async function loadMeals(){

const { data, error } =
await supabaseClient
.from("meal_calendar")
.select("*");

if(error){
console.error(error);
return;
}

meals = {};

data.forEach(row=>{

try{
meals[row.date] = JSON.parse(row.data);
}catch(e){}

});

renderCalendar();

}

function renderCalendar(){

const cal =
document.getElementById("calendar");

cal.innerHTML = "";

for(let i=1;i<=31;i++){

const date =
"2026-07-" + String(i).padStart(2,"0");

const meal =
meals[date];

const div =
document.createElement("div");

div.className = "day";

let bg = "";

if(meal && meal.photo){

bg = `
<div class="bg"
style="background-image:url('${meal.photo}')"></div>

<div class="overlay"></div>
`;

}

div.innerHTML = `
${bg}

<div class="content">
<div>${i}</div>
<div>${meal ? meal.menu : ""}</div>
</div>
`;

div.onclick = ()=>openModal(date);

cal.appendChild(div);

}

}

function openModal(date){

selectedDate = date;

document.getElementById("modal")
.classList.add("active");

document.getElementById("backdrop")
.classList.add("active");

document.getElementById("modalDate")
.innerText = date;

const meal = meals[date];

document.getElementById("mealInput")
.value = meal?.menu || "";

currentPhoto =
meal?.photo || "";

const preview =
document.getElementById("preview");

if(currentPhoto){

preview.src = currentPhoto;
preview.style.display = "block";

}else{

preview.style.display = "none";

}

document.getElementById("photoInput")
.value = "";

}

function closeModal(){

document.getElementById("modal")
.classList.remove("active");

document.getElementById("backdrop")
.classList.remove("active");

}

document.getElementById("photoInput")
.addEventListener("change",e=>{

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = ()=>{

currentPhoto = reader.result;

const preview =
document.getElementById("preview");

preview.src = currentPhoto;
preview.style.display = "block";

};

reader.readAsDataURL(file);

});

async function saveMeal(){

const menu =
document.getElementById("mealInput")
.value.trim();

if(!menu){

alert("메뉴 입력");
return;

}

const payload = {
menu:menu,
photo:currentPhoto
};

const { error } =
await supabaseClient
.from("meal_calendar")
.upsert(
[
{
date:selectedDate,
data:JSON.stringify(payload)
}
],
{
onConflict:"date"
}
);

if(error){

console.error(error);
alert("저장 실패: " + error.message);
return;

}

closeModal();

await loadMeals();

}

loadMeals();

</script>

</body>
</html>
