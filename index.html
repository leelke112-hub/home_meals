<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>강은이 유림이 식단표</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:'Nunito','Malgun Gothic',sans-serif;
    background:linear-gradient(180deg,#fff7f1 0%,#ffe9dd 100%);
    color:#5b4636;
}

.app-layout{
    display:grid;
    grid-template-columns:320px minmax(0,1fr) 340px;
    gap:20px;
    max-width:1900px;
    margin:0 auto;
    align-items:start;
}

.panel{
    background:#fffaf7;
    border-radius:26px;
    padding:22px;
    border:2px solid #ffe2d2;
    box-shadow:0 10px 25px rgba(255,170,130,0.15);

}

.side-panel{
    max-height:calc(100vh - 40px);
    overflow-y:auto;
}

h2{
    margin:0 0 18px 0;
    padding-bottom:12px;
    border-bottom:3px dashed #ffd1bb;
    color:#ff8b5c;
    font-size:24px;
}

button{
    border:none;
    border-radius:14px;
    padding:11px 14px;
    cursor:pointer;
    font-weight:800;
    transition:0.18s;
    font-family:inherit;
}

button:hover{
    transform:translateY(-2px);
}

input,
textarea{
    width:100%;
    padding:12px;
    border-radius:14px;
    border:2px solid #ffdccc;
    background:#fffefd;
    font-family:inherit;
    color:#5b4636;
    margin-bottom:10px;
    font-size:14px;
}

input:focus,
textarea:focus{
    outline:none;
    border-color:#ffb089;
    box-shadow:0 0 0 4px rgba(255,176,137,0.18);
}

.status{
    padding:12px;
    border-radius:14px;
    margin-bottom:16px;
    font-size:14px;
    font-weight:800;
}

.online{
    background:#fff0dc;
    color:#d97706;
}

.offline{
    background:#ffe2e2;
    color:#c2410c;
}

.inventory-input-wrap{
    display:flex;
    gap:8px;
}

.inventory-input-wrap input{
    margin:0;
}

.add-btn{
    width:80px;
    flex-shrink:0;
    background:linear-gradient(135deg,#ffb089,#ff8b5c);
    color:white;
}

.section{
    margin-top:18px;
}

.section-toggle{
    width:100%;
    background:#ffe7da;
    color:#7b4d34;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    font-size:15px;
}

.section-arrow{
    font-size:16px;
}

.section-content{
    display:block;
}

.section-content.hidden{
    display:none;
}

ul{
    list-style:none;
    padding:0;
    margin:0;
}

li{
    padding:10px 0;
    border-bottom:1px dashed #ffdccc;
    line-height:1.5;
}

.calendar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
}

.calendar-actions{
    display:flex;
    gap:10px;
    margin-bottom:16px;
}

.weekdays{
    display:grid;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:6px;
    margin-bottom:8px;
}

.weekdays div{
    text-align:center;
    font-weight:800;
    color:#ff9d76;
    padding:6px 0;
    font-size:14px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:6px;
}

.cell{
    background:#fffdfc;
    border:2px solid #ffe0cf;
    border-radius:16px;
    min-height:145px;
    padding:8px;
    display:flex;
    flex-direction:column;

}

.cell:hover{

}

.cell.drag-over{

.weekday-mobile{

.date{

    color:#ff9d76;

.meal-tag{

}

.recipe-link-btn{

    padding:6px;

    font-weight:800;

}

.star-rating{

    letter-spacing:0px;

    align-items:center;

}

.star-rating span{
    transition:0.15s;

}

.star-rating span:not(.empty){

}

.star-rating span.empty{
    color:#d8d8d8;

}

.modal{

    left:50%;
    transform:translate(-50%,-50%);

    border-radius:26px;

    display:none;

}

.modal.active{

}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(80,50,30,0.28);

    z-index:99;
    display:none;
}

.overlay.active{
    display:block;
}

.history-card{

    border:2px solid #ffe0cf;

    margin-bottom:10px;

}

.history-header{

    justify-content:space-between;

}

.history-body{

    padding:0 12px 12px 12px;

    font-size:14px;
}

.history-body.active{

}

.history-drag{

.pagination{

.pagination button{

}

.recommend-box{

    margin-bottom:14px;

}



.recommend-drag-btn{
    margin-top:12px;

    color:white;
}

.modal-star-wrap{

}

.modal-star-btn{

        font-size:8px;
        padding:4px;
        margin-top:4px;
    }

    .star-rating{
        font-size:16px;
    }

}

</style>
</head>

<script>

const SUPABASE_URL =
'https://utmjozwjgmhhrpyuqrpt.supabase.co';

const SUPABASE_KEY =
'sb_publishable_Sxo_yAhHLwmxBcUeGjatdQ_ZPgjwD3o';

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const STORAGE_BUCKET = 'foods';

const ROOM_ID = 'default';

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();

let mobileWeekIndex = 0;

const WEEKDAY_NAMES = [
    '일요일',
    '월요일',
    '화요일',
    '수요일',
    '목요일',
    '금요일',
    '토요일'
];

let draggedMeal = null;
let recommendedMeal = null;
let modalStarValue = 0;

let historyPage = 0;
const HISTORY_PER_PAGE = 7;

let appData = {
    meals:{},
    baseInventory:{},
    inventory:{}
};

function parseIngredient(str){

    const match =
    str.match(/^(.*?)\s*(\d+)$/);

    return match
    ? {
        name:match[1].trim(),
        qty:parseInt(match[2]),
        permanent:false
      }
    : {
        name:str.trim(),
        qty:1,
        permanent:true
      };

}

function toggleSection(id, button){

    const el =
    document.getElementById(id);

    const arrow =
    button.querySelector('.section-arrow');

    el.classList.toggle('hidden');

    arrow.innerText =
    el.classList.contains('hidden')
    ? '▶'
    : '▼';

}

function isValidURL(str){

    return str.startsWith('http://') ||
           str.startsWith('https://');

}

function getTodayString(){

    const today = new Date();

    return `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

}

async function loadData(){

    const { data } =
    await supabaseClient
    .from('meal_planner')
    .select('*')
    .eq('room_id',ROOM_ID)
    .single();

    if(data){
        appData = data.data;
    }

    if(!appData.baseInventory){
        appData.baseInventory = {};
    }

    recalculateInventory();
    updateAllViews();

}

async function saveData(){

    await supabaseClient
    .from('meal_planner')
    .update({
        data:appData,
        updated_at:new Date().toISOString()
    })
    .eq('room_id',ROOM_ID);

}

function setupRealtime(){

    supabaseClient
    .channel('meal-sync')
    .on(
        'postgres_changes',
        {
            event:'UPDATE',
            schema:'public',
            table:'meal_planner'
        },
        payload=>{

            if(payload.new.room_id === ROOM_ID){

                appData = payload.new.data;

                recalculateInventory();
                updateAllViews();

            }

        }
    )
    .subscribe(status=>{

        const el =
        document.getElementById('sync-status');

        if(status === 'SUBSCRIBED'){

            el.innerText =
            '🟢 실시간 동기화 연결됨';

            el.className =
            'status online';

        }

    });

}

function updateAllViews(){

    renderCalendar();
    renderInventory();
    renderHistory();

}

async function resizeImage(file, maxSize = 800, quality = 0.82){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.onload = e=>{

            const img = new Image();

            img.onload = ()=>{

                let width = img.width;
                let height = img.height;

                if(width > height){

                    if(width > maxSize){
                        height = height * (maxSize / width);
                        width = maxSize;
                    }

                }else{

                    if(height > maxSize){
                        width = width * (maxSize / height);
                        height = maxSize;
                    }

                }

                const canvas =
                document.createElement('canvas');

                canvas.width = width;
                canvas.height = height;

                const ctx =
                canvas.getContext('2d');

                ctx.drawImage(img,0,0,width,height);

                canvas.toBlob(blob=>{

                    if(!blob){
                        reject(new Error('이미지 변환 실패'));
                        return;
                    }

                    const compressedFile =
                    new File(
                        [blob],
                        file.name.replace(/\.\w+$/,'.jpg'),
                        {
                            type:'image/jpeg'
                        }
                    );

                    resolve(compressedFile);

                },'image/jpeg',quality);

            };

            img.onerror = reject;
            img.src = e.target.result;

        };

        reader.onerror = reject;
        reader.readAsDataURL(file);

    });

}

async function uploadMealPhoto(file){

    const resizedFile =
    await resizeImage(file);

    const extension =
    'jpg';

    const fileName =
    `${Date.now()}_${Math.random()
    .toString(36)
    .substring(2)}.${extension}`;

    const filePath =
    `meal-photos/${fileName}`;

    const { error } =
    await supabaseClient.storage
    .from(STORAGE_BUCKET)
    .upload(filePath, resizedFile);

    if(error){

        alert('이미지 업로드 실패 😢');
        console.error(error);

        return null;
    }

    const { data } =
    supabaseClient.storage
    .from(STORAGE_BUCKET)
    .getPublicUrl(filePath);

    return data.publicUrl;

}

function addInventory(){

    const input =
    document
    .getElementById('new-item-name')
    .value
    .trim();

    if(!input) return;

    const parsed =
    parseIngredient(input);

    if(parsed.permanent){

        appData.baseInventory[parsed.name] = {
            qty:999999,
            permanent:true
        };

    }else{

        if(!appData.baseInventory[parsed.name]){

            appData.baseInventory[parsed.name] = {
                qty:0,
                permanent:false
            };

        }

        appData.baseInventory[parsed.name].qty += parsed.qty;

    }

    document.getElementById('new-item-name').value='';

    recalculateInventory();

    saveData();

    updateAllViews();

}

function removeInventory(name){

    delete appData.baseInventory[name];

    recalculateInventory();

    saveData();

    updateAllViews();

}

function recalculateInventory(){

    const calculated = {};

    Object.keys(appData.baseInventory)
    .forEach(name=>{

        const item =
        appData.baseInventory[name];

        calculated[name] = {
            qty:item.qty,
            permanent:item.permanent
        };

    });

    const todayString =
    getTodayString();

    Object.entries(appData.meals)
    .forEach(([date,meal])=>{

        if(date < todayString){
            return;
        }

        meal.ingredients.forEach(i=>{

            const parsed =
            parseIngredient(i);

            if(
                calculated[parsed.name] &&
                calculated[parsed.name].permanent
            ){
                return;
            }

            if(!calculated[parsed.name]){

                calculated[parsed.name] = {
                    qty:0,
                    permanent:false
                };

            }

            calculated[parsed.name].qty -= parsed.qty;

        });

    });

    appData.inventory = calculated;

}

function purchaseIngredient(name, qty){

    if(!appData.baseInventory[name]){

        appData.baseInventory[name] = {
            qty:0,
            permanent:false
        };

    }

    appData.baseInventory[name].qty += qty;

    recalculateInventory();
    saveData();
    updateAllViews();

}

function purchaseAllIngredients(){

    Object.keys(appData.inventory)
    .forEach(name=>{

        const item =
        appData.inventory[name];

        if(!item.permanent && item.qty < 0){

            if(!appData.baseInventory[name]){

                appData.baseInventory[name] = {
                    qty:0,
                    permanent:false
                };

            }

            appData.baseInventory[name].qty += Math.abs(item.qty);

        }

    });

    recalculateInventory();
    saveData();
    updateAllViews();

}

function renderInventory(){

    const inventoryList =
    document.getElementById('inventory-list');

    const shoppingList =
    document.getElementById('shopping-list');

    const plannedList =
    document.getElementById('planned-list');

    inventoryList.innerHTML='';
    shoppingList.innerHTML='';
    plannedList.innerHTML='';

    const plannedMap = {};

    const todayString =
    getTodayString();

    Object.entries(appData.meals)
    .forEach(([date,meal])=>{

        if(date < todayString){
            return;
        }

        meal.ingredients.forEach(i=>{

            const parsed =
            parseIngredient(i);

            if(!plannedMap[parsed.name]){
                plannedMap[parsed.name]=0;
            }

            plannedMap[parsed.name]+=parsed.qty;

        });

    });

    Object.keys(plannedMap)
    .sort()
    .forEach(name=>{

        plannedList.innerHTML += `
        <li>
        📋 ${name} (${plannedMap[name]})
        </li>`;

    });

    Object.keys(appData.inventory)
    .sort()
    .forEach(name=>{

        const item =
        appData.inventory[name];

        if(item.permanent){

            inventoryList.innerHTML += `
            <li>
            ♾️ ${name}

            <button
            onclick="removeInventory('${name}')"
            style="float:right; background:#ff8f8f; color:white;">
            X
            </button>

            </li>`;

            return;
        }

        if(item.qty > 0){

            inventoryList.innerHTML += `
            <li>
            📦 ${name} (${item.qty})

            <button
            onclick="removeInventory('${name}')"
            style="float:right; background:#ff8f8f; color:white;">
            X
            </button>

            </li>`;

        }else if(item.qty < 0){

            shoppingList.innerHTML += `
            <li>

            ❌ ${name} (${Math.abs(item.qty)} 부족)

            <button
            class="buy-btn"
            onclick="purchaseIngredient('${name}', ${Math.abs(item.qty)})">
            구매완료
            </button>

            </li>`;

        }

    });

}


function getMondayBasedDay(day){

    return day === 0 ? 6 : day - 1;

}

function renderCalendar(){

    const grid =
    document.getElementById('calendar-grid');

    grid.innerHTML='';

    const isMobile =
    window.innerWidth <= 900;

    const days =
    new Date(currentYear,currentMonth+1,0).getDate();

    const firstDay =
    getMondayBasedDay(
        new Date(currentYear,currentMonth,1).getDay()
    );

    const totalWeeks =
    Math.ceil((firstDay + days) / 7);

    if(mobileWeekIndex >= totalWeeks){
        mobileWeekIndex = totalWeeks - 1;
    }

    let title =
    `${currentYear}년 ${currentMonth+1}월`;

    if(isMobile){
        title += ` · ${mobileWeekIndex+1}주차`;
    }

    document.getElementById('month-title').innerText =
    title;

    let weekStart = 0;
    let weekEnd = totalWeeks;

    if(isMobile){
        weekStart = mobileWeekIndex;
        weekEnd = mobileWeekIndex + 1;
    }

    for(let week=weekStart; week<weekEnd; week++){

        for(let dayIndex=0; dayIndex<7; dayIndex++){

            const cellIndex =
            week * 7 + dayIndex;

            const dayNumber =
            cellIndex - firstDay + 1;

            const cell =
            document.createElement('div');

            cell.className='cell';

            if(dayNumber < 1 || dayNumber > days){

                if(isMobile){
                    continue;
                }

                cell.style.visibility='hidden';
                grid.appendChild(cell);
                continue;

            }

            const date =
            `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(dayNumber).padStart(2,'0')}`;

            const currentDate =
            new Date(currentYear,currentMonth,dayNumber);

            const weekdayName =
            WEEKDAY_NAMES[currentDate.getDay()];

            cell.onclick=()=>openModal(date);

            cell.addEventListener('dragover', e=>{
                e.preventDefault();
                cell.classList.add('drag-over');
            });

            cell.addEventListener('dragleave', ()=>{
                cell.classList.remove('drag-over');
            });

            cell.addEventListener('drop', ()=>{

                cell.classList.remove('drag-over');

                if(!draggedMeal) return;

                appData.meals[date] = {
                    menu:draggedMeal.menu,
                    memo:draggedMeal.memo,
                    ingredients:[...(draggedMeal.ingredients || [])],
                    star:draggedMeal.star || 0,
                    photo:draggedMeal.photo || ''
                };

                recalculateInventory();
                saveData();
                updateAllViews();

            });

            let html =
            `
            <div class="date">
                ${dayNumber}
                <div class="weekday-mobile">
                    ${weekdayName}
                </div>
            </div>
            `;

            if(appData.meals[date]){

                const meal =
                appData.meals[date];

                if(meal.photo){

                    cell.style.backgroundImage =
                    `linear-gradient(rgba(255,255,255,0.45),
                    rgba(255,255,255,0.45)),
                    url(${meal.photo})`;

                    cell.style.backgroundSize = 'cover';
                    cell.style.backgroundPosition = 'center';

                }

                html += `
                <div class="meal-tag">
                🍽 ${meal.menu}
                </div>`;

                if(isValidURL(meal.memo)){

                    html += `
                    <a
                        class="recipe-link-btn"
                        href="${meal.memo}"
                        target="_blank"
                        onclick="event.stopPropagation()">
                        📖 레시피
                    </a>`;

                }

                html += generateStarHTML(date,meal.star||0);

            }

            cell.innerHTML = html;

            grid.appendChild(cell);

        }

    }

}

window.addEventListener('resize',()=>{

    if(window.innerWidth > 900){
        mobileWeekIndex = 0;
    }

    renderCalendar();

});

function renderModalStars(){

    const wrap =
    document.getElementById('modal-star-wrap');

    wrap.innerHTML='';

    for(let i=1;i<=5;i++){

        wrap.innerHTML += `
        <button
        type="button"
        class="modal-star-btn ${i<=modalStarValue?'active':''}"
        onclick="setModalStar(${i})">
        ★
        </button>
        `;

    }

}

function setModalStar(value){

    modalStarValue =
    modalStarValue===value
    ? 0
    : value;

    renderModalStars();

}

document.addEventListener('DOMContentLoaded',()=>{

    const recommendBtn =
    document.getElementById('recommend-drag-btn');

    if(recommendBtn){

        recommendBtn.addEventListener('dragstart',()=>{

            if(recommendedMeal){

                draggedMeal = recommendedMeal;

            }

        });

    }

});


function generateStarHTML(date,star){

    let html =
    `<div class="star-rating">`;

    for(let i=1;i<=5;i++){

        html += `
        <span
        class="${i<=star?'':'empty'}"
        onclick="event.stopPropagation(); setStar('${date}',${i})">
        ★
        </span>`;

    }

    return html + '</div>';

}

function setStar(date,star){

    if(!appData.meals[date]) return;

    appData.meals[date].star =
    appData.meals[date].star===star
    ? 0
    : star;

    saveData();
    updateAllViews();

}

function openModal(date){

    document.getElementById('overlay')
    .classList.add('active');

    document.getElementById('meal-modal')
    .classList.add('active');

    document.getElementById('modal-date-title')
    .innerText=date;

    document.getElementById('modal-date')
    .value=date;

    const meal =
    appData.meals[date];

    document.getElementById('modal-menu')
    .value=meal?meal.menu:'';

    document.getElementById('modal-memo')
    .value=meal?meal.memo:'';

    document.getElementById('modal-ingredients')
    .value=
    meal
    ? meal.ingredients.join(', ')
    : '';

    modalStarValue =
    meal?.star || 0;

    renderModalStars();

    document.getElementById('modal-photo').value='';

    const preview =
    document.getElementById('photo-preview');

    if(meal && meal.photo){

        preview.src = meal.photo;

        preview.style.display='block';

    }else{

        preview.style.display='none';
    }

}

function closeModal(){

    document.getElementById('overlay')
    .classList.remove('active');

    document.getElementById('meal-modal')
    .classList.remove('active');

}

async function saveMeal(){

    const date =
    document.getElementById('modal-date').value;

    const menu =
    document.getElementById('modal-menu')
    .value.trim();

    const memo =
    document.getElementById('modal-memo')
    .value.trim();

    const ingredients =
    document.getElementById('modal-ingredients')
    .value
    .split(',')
    .map(v=>v.trim())
    .filter(v=>v);

    if(!menu){
        return;
    }

    let photo =
    appData.meals[date]?.photo || '';

    const file =
    document.getElementById('modal-photo')
    .files[0];

    if(file){

        photo =
        await uploadMealPhoto(file);

        if(!photo){
            return;
        }

    }

    appData.meals[date] = {
        menu,
        memo,
        ingredients,
        photo,
        star:modalStarValue
    };

    recalculateInventory();

    await saveData();

    closeModal();

    updateAllViews();

}

function deleteMeal(){

    const date =
    document.getElementById('modal-date').value;

    delete appData.meals[date];

    recalculateInventory();

    saveData();

    closeModal();

    updateAllViews();

}

function setDiningOut(){

    document.getElementById('modal-menu')
    .value='외식/배달';

    document.getElementById('modal-ingredients')
    .value='';

    saveMeal();

}

function changeMonth(offset){

    const isMobile =
    window.innerWidth <= 900;

    if(isMobile){

        const days =
        new Date(currentYear,currentMonth+1,0).getDate();

        const firstDay =
        getMondayBasedDay(
            new Date(currentYear,currentMonth,1).getDay()
        );

        const totalWeeks =
        Math.ceil((firstDay + days) / 7);

        mobileWeekIndex += offset;

        if(mobileWeekIndex >= totalWeeks){

            mobileWeekIndex = 0;
            currentMonth++;

            if(currentMonth > 11){
                currentMonth = 0;
                currentYear++;
            }

        }

        if(mobileWeekIndex < 0){

            currentMonth--;

            if(currentMonth < 0){
                currentMonth = 11;
                currentYear--;
            }

            const prevDays =
            new Date(currentYear,currentMonth+1,0).getDate();

            const prevFirstDay =
            getMondayBasedDay(
                new Date(currentYear,currentMonth,1).getDay()
            );

            mobileWeekIndex =
            Math.ceil((prevFirstDay + prevDays) / 7) - 1;

        }

    }else{

        currentMonth += offset;

        if(currentMonth < 0){

            currentMonth = 11;
            currentYear--;

        }

        if(currentMonth > 11){

            currentMonth = 0;
            currentYear++;

        }

    }

    renderCalendar();

}

function resetCurrentMonth(){

    if(!confirm('이번달 데이터 초기화할까요?'))
    return;

    const prefix =
    `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;

    Object.keys(appData.meals)
    .forEach(date=>{

        if(date.startsWith(prefix)){
            delete appData.meals[date];
        }

    });

    recalculateInventory();

    saveData();

    updateAllViews();

}

function toggleHistory(index){

    const el =
    document.getElementById(`history-body-${index}`);

    el.classList.toggle('active');

}

function renderHistory(){

    const list =
    document.getElementById('history-list');

    const keyword =
    document.getElementById('history-search')
    .value.trim();

    list.innerHTML='';

    let meals =
    Object.entries(appData.meals)
    .sort((a,b)=>b[0].localeCompare(a[0]));

    if(keyword){

        meals = meals.filter(([date,meal])=>{

            const ingredientText =
            meal.ingredients.join(', ');

            const target =
            `${meal.menu} ${ingredientText}`;

            return target.includes(keyword);

        });

    }

    const start =
    historyPage * HISTORY_PER_PAGE;

    const paged =
    meals.slice(start,start+HISTORY_PER_PAGE);

    paged.forEach(([date,meal],index)=>{

        const realIndex =
        start + index;

        const stars =
        '★'.repeat(meal.star || 0);

        list.innerHTML += `
        <div class="history-card">

            <div
            class="history-header"
            onclick="toggleHistory(${realIndex})">

                <span>
                ${date} - 🍽 ${meal.menu}
                </span>

                <span>
                ▼
                </span>

            </div>

            <div
            class="history-body"
            id="history-body-${realIndex}">

                ⭐ ${stars || '없음'}<br><br>

                🥕 식재료:<br>

                ${(meal.ingredients || []).join(', ') || '없음'}

                <button
                class="history-drag"
                draggable="true"
                ondragstart="startDrag('${date}')">
                📌 드래그해서 달력에 놓기
                </button>

            </div>

        </div>`;

    });

}

function startDrag(date){

    draggedMeal =
    appData.meals[date];

}

function prevHistoryPage(){

    if(historyPage > 0){

        historyPage--;
        renderHistory();

    }

}

function nextHistoryPage(){

    const total =
    Object.keys(appData.meals).length;

    if(
        (historyPage+1)*HISTORY_PER_PAGE
        < total
    ){

        historyPage++;
        renderHistory();

    }

}

function recommendMenu(){

    const meals =
    Object.entries(appData.meals);

    if(meals.length === 0){
        alert('아직 추천할 데이터가 없어요!');
        return;
    }

    const today = new Date();

    const inventoryNames =
    Object.keys(appData.inventory)
    .filter(name=>{

        const item = appData.inventory[name];

        return item.permanent || item.qty > 0;

    });

    const candidates = [];

    meals.forEach(([date,meal])=>{

        if((meal.star || 0) < 3){
            return;
        }

        const diffDays =
        Math.floor(
            (today - new Date(date))
            / (1000*60*60*24)
        );

        if(diffDays < 7){
            return;
        }

        const canCook =
        (meal.ingredients || []).every(i=>{

            const parsed =
            parseIngredient(i);

            return inventoryNames.includes(parsed.name);

        });

        if(!canCook){
            return;
        }

        candidates.push(meal);

    });

    if(candidates.length === 0){

        alert(
`추천 가능한 메뉴가 없어요 😢

조건:

- 별점 3 이상
- 최근 7일 이내 먹지 않음
- 현재 보유 식재료로 가능`
        );

        return;
    }

    const picked =
    candidates[
        Math.floor(Math.random()*candidates.length)
    ];

    recommendedMeal = picked;

    document.getElementById('recommend-box')
    .style.display='block';

    document.getElementById('recommend-menu-name')
    .innerText =
    picked.menu;

    document.getElementById('recommend-menu-info')
    .innerHTML =
    `
    ⭐ ${picked.star}점<br>
    🥕 ${(picked.ingredients || []).join(', ')}
    `;

}

loadData();
setupRealtime();

</script>
