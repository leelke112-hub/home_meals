
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>강은이 유림이 식단표</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:'Nunito','Malgun Gothic',sans-serif;
    background:linear-gradient(180deg,#fff7f1 0%,#ffe9dd 100%);
    color:#5b4636;
}

.app-layout{
    display:grid;
    grid-template-columns:320px minmax(0,1fr) 320px;
    gap:20px;
    max-width:1800px;
    margin:0 auto;
    align-items:start;
}

.panel{
    background:#fffaf7;
    border-radius:26px;
    padding:22px;
    border:2px solid #ffe2d2;
    box-shadow:0 10px 25px rgba(255,170,130,0.15);
    overflow:hidden;
}

.side-panel{
    max-height:calc(100vh - 40px);
    overflow-y:auto;
}

h2{
    margin:0 0 18px 0;
    padding-bottom:12px;
    border-bottom:3px dashed #ffd1bb;
    color:#ff8b5c;
    font-size:24px;
}

button{
    border:none;
    border-radius:14px;
    padding:11px 14px;
    cursor:pointer;
    font-weight:800;
    transition:0.18s;
    font-family:inherit;
}

button:hover{
    transform:translateY(-2px);
}

input,
textarea{
    width:100%;
    padding:12px;
    border-radius:14px;
    border:2px solid #ffdccc;
    background:#fffefd;
    font-family:inherit;
    color:#5b4636;
    margin-bottom:10px;
    font-size:14px;
}

input:focus,
textarea:focus{
    outline:none;
    border-color:#ffb089;
    box-shadow:0 0 0 4px rgba(255,176,137,0.18);
}

.status{
    padding:12px;
    border-radius:14px;
    margin-bottom:16px;
    font-size:14px;
    font-weight:800;
}

.online{
    background:#fff0dc;
    color:#d97706;
}

.offline{
    background:#ffe2e2;
    color:#c2410c;
}

.inventory-input-wrap{
    display:flex;
    gap:8px;
}

.inventory-input-wrap input{
    margin:0;
}

.add-btn{
    width:80px;
    flex-shrink:0;
    background:linear-gradient(135deg,#ffb089,#ff8b5c);
    color:white;
}

.section{
    margin-top:18px;
}

.section-toggle{
    width:100%;
    background:#ffe7da;
    color:#7b4d34;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    font-size:15px;
}

.section-arrow{
    font-size:16px;
}

.section-content{
    display:block;
}

.section-content.hidden{
    display:none;
}

ul{
    list-style:none;
    padding:0;
    margin:0;
}

li{
    padding:10px 0;
    border-bottom:1px dashed #ffdccc;
    line-height:1.5;
}

.recipe-item{
    background:#fff3d7;
    padding:10px;
    border-radius:12px;
    margin-bottom:6px;
    border:none;
}

.calendar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
}

.calendar-actions{
    display:flex;
    gap:10px;
    margin-bottom:16px;
}

.calendar-actions button{
    flex:1;
}

.weekdays{
    display:grid;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:6px;
    margin-bottom:8px;
}

.weekdays div{
    text-align:center;
    font-weight:800;
    color:#ff9d76;
    padding:6px 0;
    font-size:14px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:6px;
}

.cell{
    background:#fffdfc;
    border:2px solid #ffe0cf;
    border-radius:16px;
    min-height:145px;
    padding:8px;
    display:flex;
    flex-direction:column;
    transition:0.18s;
    cursor:pointer;
    overflow:hidden;
}

.cell:hover{
    transform:translateY(-3px);
    background:#fff5ef;
}

.date{
    font-weight:800;
    color:#ff9d76;
    margin-bottom:6px;
    font-size:14px;
}

.meal-tag{
    background:linear-gradient(135deg,#ffd8c2,#ffe9dd);
    color:#7b4d34;
    border-radius:12px;
    padding:6px;
    text-align:center;
    font-size:12px;
    font-weight:800;
    line-height:1.3;
    word-break:keep-all;
}

.recipe-link-btn{
    margin-top:6px;
    background:#ffcf91;
    color:#7b4d34;
    font-size:11px;
    padding:6px;
    text-align:center;
    text-decoration:none;
    border-radius:10px;
    font-weight:800;
    display:block;
}

.star-rating{
    margin-top:auto;
    text-align:center;
    font-size:16px;
    color:#ffc83d;
    padding-top:6px;
    white-space:nowrap;
    overflow:hidden;
    line-height:1;
}

.star-rating span{
    display:inline-block;
}

.star-rating span.empty{
    color:#ffe7a0;
}

.modal{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:min(92vw,420px);
    background:#fffaf7;
    border-radius:26px;
    padding:24px;
    border:2px solid #ffd8c2;
    z-index:100;
    display:none;
    box-shadow:0 20px 40px rgba(0,0,0,0.18);
}

.modal.active{
    display:block;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(80,50,30,0.28);
    backdrop-filter:blur(3px);
    z-index:99;
    display:none;
}

.overlay.active{
    display:block;
}

.history-stars{
    color:#ffc83d;
    font-size:18px;
}

.input-label{
    font-size:13px;
    font-weight:800;
    color:#ff8b5c;
    margin-bottom:6px;
}

@media(max-width:1400px){

    .app-layout{
        grid-template-columns:1fr;
    }

    .side-panel{
        max-height:none;
    }

}

@media(max-width:900px){

    body{
        padding:8px;
    }

    .panel{
        padding:12px;
    }

    .grid{
        grid-template-columns:repeat(7,minmax(0,1fr));
        gap:3px;
    }

    .weekdays{
        grid-template-columns:repeat(7,minmax(0,1fr));
        gap:3px;
    }

    .weekdays div{
        font-size:10px;
        padding:3px 0;
    }

    .cell{
        min-height:82px;
        padding:4px;
        border-radius:10px;
    }

    .date{
        font-size:10px;
        margin-bottom:3px;
    }

    .meal-tag{
        font-size:9px;
        padding:4px;
        border-radius:8px;
        line-height:1.15;
    }

    .recipe-link-btn{
        font-size:8px;
        padding:4px;
        margin-top:4px;
        border-radius:6px;
    }

    .star-rating{
        font-size:9px;
        padding-top:4px;
        letter-spacing:-1px;
    }

    .calendar-actions{
        flex-direction:column;
    }

    .calendar-header h2{
        font-size:18px;
    }

    button{
        font-size:12px;
        padding:9px 10px;
    }

}

</style>
</head>

<body>

<div class="app-layout">

<div class="panel side-panel">

<div id="sync-status" class="status offline">
실시간 연결 중...
</div>

<h2>🧺 식재료 관리</h2>

<div style="font-size:13px; color:#666; margin-bottom:10px;">
숫자 없이 입력하면 상시 재료로 처리<br>
예: 간장 / 소금 / 후추
</div>

<div class="inventory-input-wrap">

<input
type="text"
id="new-item-name"
placeholder="예: 햇반 2 / 간장">

<button
class="add-btn"
onclick="addInventory()">
추가
</button>

</div>

<div class="section">

<button class="section-toggle"
onclick="toggleSection('inventory-section', this)">
<span>📦 보유 식재료</span>
<span class="section-arrow">▼</span>
</button>

<div id="inventory-section" class="section-content">
<ul id="inventory-list"></ul>
</div>

</div>

<div class="section">

<button class="section-toggle"
onclick="toggleSection('shopping-section', this)">
<span>🛒 구매 필요</span>
<span class="section-arrow">▼</span>
</button>

<div id="shopping-section" class="section-content">
<ul id="shopping-list"></ul>
</div>

</div>

<div class="section">

<button class="section-toggle"
onclick="toggleSection('recipe-section', this)">
<span>🍳 사용예정 식재료</span>
<span class="section-arrow">▼</span>
</button>

<div id="recipe-section" class="section-content">
<ul id="recipe-ingredient-list"></ul>
</div>

</div>

</div>

<div class="panel" id="calendar-panel">

<div class="calendar-header">

<button onclick="changeMonth(-1)"
style="background:#ffb089; color:white;">
◀ 이전
</button>

<h2 id="month-title"
style="margin:0; border:none; padding:0;"></h2>

<button onclick="changeMonth(1)"
style="background:#ffb089; color:white;">
다음 ▶
</button>

</div>

<div class="calendar-actions">

<button onclick="exportToImage()"
style="background:#7ec8e3; color:white;">
📸 캘린더 저장
</button>

<button onclick="resetCurrentMonth()"
style="background:#ff8f8f; color:white;">
🗑 초기화
</button>

</div>

<div class="weekdays">
<div>일</div>
<div>월</div>
<div>화</div>
<div>수</div>
<div>목</div>
<div>금</div>
<div>토</div>
</div>

<div class="grid" id="calendar-grid"></div>

</div>

<div class="panel side-panel">

<h2>📚 식단 히스토리</h2>

<input
type="text"
id="history-search"
placeholder="식재료 / 별점 검색"
onkeyup="renderHistory()">

<ul id="history-list"></ul>

</div>

</div>

<div class="overlay"
id="overlay"
onclick="closeModal()"></div>

<div class="modal" id="meal-modal">

<h3 id="modal-date-title"></h3>

<input type="hidden" id="modal-date">

<div class="input-label">
🍽 메뉴 이름
</div>

<input
type="text"
id="modal-menu"
placeholder="예: 김치볶음밥">

<div class="input-label">
📝 메모 / 레시피 링크
</div>

<textarea
id="modal-memo"
rows="3"
placeholder="레시피 링크 또는 메모 입력"></textarea>

<div class="input-label">
🥕 필요 식재료
</div>

<input
type="text"
id="modal-ingredients"
placeholder="예: 햇반 2, 김치 1, 계란 2">

<div style="display:flex; gap:8px;">

<button
onclick="saveMeal()"
style="background:#9ad29a; color:white; flex:2;">
저장
</button>

<button
onclick="setDiningOut()"
style="background:#ffbe76; color:white; flex:1;">
외식
</button>

</div>

<button
onclick="deleteMeal()"
style="background:#ff8f8f; color:white; width:100%; margin-top:10px;">
삭제
</button>

</div>

<script>

const SUPABASE_URL =
'https://utmjozwjgmhhrpyuqrpt.supabase.co';

const SUPABASE_KEY =
'sb_publishable_Sxo_yAhHLwmxBcUeGjatdQ_ZPgjwD3o';

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const ROOM_ID = 'default';

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();

let appData = {
    meals:{},
    baseInventory:{},
    inventory:{}
};

function parseIngredient(str){

    const match =
    str.match(/^(.*?)\s*(\d+)$/);

    return match
    ? {
        name:match[1].trim(),
        qty:parseInt(match[2]),
        permanent:false
      }
    : {
        name:str.trim(),
        qty:1,
        permanent:true
      };
}

function toggleSection(id, button){

    const el =
    document.getElementById(id);

    const arrow =
    button.querySelector('.section-arrow');

    el.classList.toggle('hidden');

    arrow.innerText =
    el.classList.contains('hidden')
    ? '▶'
    : '▼';

}

function isValidURL(str){

    return str.startsWith('http://') ||
           str.startsWith('https://');

}

async function loadData(){

    const { data } =
    await supabaseClient
    .from('meal_planner')
    .select('*')
    .eq('room_id',ROOM_ID)
    .single();

    if(data){
        appData = data.data;
    }

    if(!appData.baseInventory){
        appData.baseInventory = {};
    }

    recalculateInventory();
    updateAllViews();

}

async function saveData(){

    await supabaseClient
    .from('meal_planner')
    .update({
        data:appData,
        updated_at:new Date().toISOString()
    })
    .eq('room_id',ROOM_ID);

}

function setupRealtime(){

    supabaseClient
    .channel('meal-sync')
    .on(
        'postgres_changes',
        {
            event:'UPDATE',
            schema:'public',
            table:'meal_planner'
        },
        payload=>{

            if(payload.new.room_id === ROOM_ID){

                appData = payload.new.data;

                if(!appData.baseInventory){
                    appData.baseInventory = {};
                }

                recalculateInventory();
                updateAllViews();

            }

        }
    )
    .subscribe(status=>{

        const el =
        document.getElementById('sync-status');

        if(status === 'SUBSCRIBED'){

            el.innerText =
            '🟢 실시간 동기화 연결됨';

            el.className =
            'status online';

        }

    });

}

function updateAllViews(){

    renderCalendar();
    renderInventory();
    renderRecipeIngredients();
    renderHistory();

}

function addInventory(){

    const input =
    document
    .getElementById('new-item-name')
    .value
    .trim();

    if(!input) return;

    const parsed =
    parseIngredient(input);

    if(parsed.permanent){

        appData.baseInventory[parsed.name] = {
            qty:999999,
            permanent:true
        };

    }else{

        if(!appData.baseInventory[parsed.name]){

            appData.baseInventory[parsed.name] = {
                qty:0,
                permanent:false
            };

        }

        appData.baseInventory[parsed.name].qty += parsed.qty;

    }

    document.getElementById('new-item-name').value='';

    recalculateInventory();

    saveData();

    updateAllViews();

}

function removeInventory(name){

    delete appData.baseInventory[name];

    recalculateInventory();

    saveData();

    updateAllViews();

}

function recalculateInventory(){

    const calculated = {};

    Object.keys(appData.baseInventory)
    .forEach(name=>{

        const item =
        appData.baseInventory[name];

        calculated[name] = {
            qty:item.qty,
            permanent:item.permanent
        };

    });

    Object.values(appData.meals)
    .forEach(meal=>{

        meal.ingredients.forEach(i=>{

            const parsed =
            parseIngredient(i);

            if(
                calculated[parsed.name] &&
                calculated[parsed.name].permanent
            ){
                return;
            }

            if(!calculated[parsed.name]){

                calculated[parsed.name] = {
                    qty:0,
                    permanent:false
                };

            }

            calculated[parsed.name].qty -= parsed.qty;

        });

    });

    appData.inventory = calculated;

}

function renderInventory(){

    const list =
    document.getElementById('inventory-list');

    const shop =
    document.getElementById('shopping-list');

    list.innerHTML='';
    shop.innerHTML='';

    Object.keys(appData.inventory)
    .sort()
    .forEach(name=>{

        const item =
        appData.inventory[name];

        if(item.permanent){

            list.innerHTML += `
            <li>
            ♾️ ${name}
            <button
            onclick="removeInventory('${name}')"
            style="float:right; background:#ff8f8f; color:white;">
            X
            </button>
            </li>`;

            return;
        }

        if(item.qty > 0){

            list.innerHTML += `
            <li>
            📦 ${name} (${item.qty})
            <button
            onclick="removeInventory('${name}')"
            style="float:right; background:#ff8f8f; color:white;">
            X
            </button>
            </li>`;

        }else if(item.qty < 0){

            shop.innerHTML += `
            <li>
            ❌ ${name} (${Math.abs(item.qty)} 부족)
            </li>`;

        }

    });

    if(shop.innerHTML===''){
        shop.innerHTML =
        '<li>🛒 모든 재료 확보됨</li>';
    }

}

function renderRecipeIngredients(){

    const list =
    document.getElementById('recipe-ingredient-list');

    list.innerHTML='';

    const recipeMap = {};

    Object.values(appData.meals)
    .forEach(meal=>{

        meal.ingredients.forEach(i=>{

            const parsed =
            parseIngredient(i);

            if(!recipeMap[parsed.name]){
                recipeMap[parsed.name] = 0;
            }

            recipeMap[parsed.name] += parsed.qty;

        });

    });

    Object.keys(recipeMap)
    .sort()
    .forEach(name=>{

        list.innerHTML += `
        <li class="recipe-item">
        🍳 ${name} (${recipeMap[name]})
        </li>`;

    });

}

function renderCalendar(){

    const grid =
    document.getElementById('calendar-grid');

    grid.innerHTML='';

    document.getElementById('month-title').innerText =
    `${currentYear}년 ${currentMonth+1}월`;

    const firstDay =
    new Date(currentYear,currentMonth,1).getDay();

    const days =
    new Date(currentYear,currentMonth+1,0).getDate();

    for(let i=0;i<firstDay;i++){

        const empty =
        document.createElement('div');

        empty.className='cell';

        empty.style.visibility='hidden';

        grid.appendChild(empty);

    }

    for(let i=1;i<=days;i++){

        const date =
        `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

        const cell =
        document.createElement('div');

        cell.className='cell';

        cell.onclick=()=>openModal(date);

        let html =
        `<div class="date">${i}</div>`;

        if(appData.meals[date]){

            const meal =
            appData.meals[date];

            html += `
            <div class="meal-tag">
            🍽 ${meal.menu}
            </div>`;

            if(isValidURL(meal.memo)){

                html += `
                <a
                class="recipe-link-btn"
                href="${meal.memo}"
                target="_blank"
                onclick="event.stopPropagation()">
                📖 레시피
                </a>`;

            }

            html += generateStarHTML(date,meal.star||0);

        }

        cell.innerHTML = html;

        grid.appendChild(cell);

    }

}

function generateStarHTML(date,star){

    let html =
    `<div class="star-rating">`;

    for(let i=1;i<=5;i++){

        html += `
        <span
        class="${i<=star?'':'empty'}"
        onclick="event.stopPropagation(); setStar('${date}',${i})">
        ★
        </span>`;

    }

    return html + '</div>';

}

function setStar(date,star){

    if(!appData.meals[date]) return;

    appData.meals[date].star =
    appData.meals[date].star===star
    ? 0
    : star;

    saveData();

    updateAllViews();

}

function openModal(date){

    document.getElementById('overlay')
    .classList.add('active');

    document.getElementById('meal-modal')
    .classList.add('active');

    document.getElementById('modal-date-title')
    .innerText=date;

    document.getElementById('modal-date')
    .value=date;

    const meal =
    appData.meals[date];

    document.getElementById('modal-menu')
    .value=meal?meal.menu:'';

    document.getElementById('modal-memo')
    .value=meal?meal.memo:'';

    document.getElementById('modal-ingredients')
    .value=
    meal
    ? meal.ingredients.join(', ')
    : '';

}

function closeModal(){

    document.getElementById('overlay')
    .classList.remove('active');

    document.getElementById('meal-modal')
    .classList.remove('active');

}

function saveMeal(){

    const date =
    document.getElementById('modal-date').value;

    const menu =
    document.getElementById('modal-menu')
    .value.trim();

    const memo =
    document.getElementById('modal-memo')
    .value.trim();

    const ingredients =
    document.getElementById('modal-ingredients')
    .value
    .split(',')
    .map(v=>v.trim())
    .filter(v=>v);

    if(!menu){

        alert('메뉴 이름 입력');
        return;

    }

    appData.meals[date] = {
        menu,
        memo,
        ingredients,
        star:
        appData.meals[date]?.star || 0
    };

    recalculateInventory();

    saveData();

    closeModal();

    updateAllViews();

}

function deleteMeal(){

    const date =
    document.getElementById('modal-date').value;

    delete appData.meals[date];

    recalculateInventory();

    saveData();

    closeModal();

    updateAllViews();

}

function setDiningOut(){

    document.getElementById('modal-menu')
    .value='외식/배달';

    document.getElementById('modal-ingredients')
    .value='';

    saveMeal();

}

function changeMonth(offset){

    currentMonth += offset;

    if(currentMonth < 0){

        currentMonth = 11;
        currentYear--;

    }

    if(currentMonth > 11){

        currentMonth = 0;
        currentYear++;

    }

    renderCalendar();

}

function resetCurrentMonth(){

    if(!confirm('이번달 데이터 초기화할까요?'))
    return;

    const prefix =
    `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;

    Object.keys(appData.meals)
    .forEach(date=>{

        if(date.startsWith(prefix)){
            delete appData.meals[date];
        }

    });

    recalculateInventory();

    saveData();

    updateAllViews();

}

function renderHistory(){

    const list =
    document.getElementById('history-list');

    const keyword =
    document.getElementById('history-search')
    .value.trim();

    list.innerHTML='';

    Object.keys(appData.meals)
    .sort((a,b)=>b.localeCompare(a))
    .forEach(date=>{

        const meal =
        appData.meals[date];

        const ingredientText =
        meal.ingredients.join(', ');

        const stars =
        '★'.repeat(meal.star || 0);

        const searchTarget =
        `${ingredientText} ${stars}`;

        if(
            keyword &&
            !searchTarget.includes(keyword)
        ){
            return;
        }

        list.innerHTML += `
        <li>
        <strong>${date}</strong><br>
        🍽 ${meal.menu}<br>
        <span class="history-stars">${stars}</span><br>
        <small>
        🥕 식재료: ${ingredientText || '없음'}
        </small>
        </li>`;

    });

}

function exportToImage(){

    html2canvas(
        document.getElementById('calendar-panel'),
        {
            scale:2,
            backgroundColor:'#fff'
        }
    )
    .then(canvas=>{

        const a =
        document.createElement('a');

        a.download='식단표.png';

        a.href=canvas.toDataURL();

        a.click();

    });

}

loadData();
setupRealtime();

</script>
