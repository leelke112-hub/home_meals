<script>
const SUPABASE_URL = 'https://utmjozwjgmhhrpyuqrpt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Sxo_yAhHLwmxBcUeGjatdQ_ZPgjwD3o';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const STORAGE_BUCKET = 'foods';
const ROOM_ID = 'default';

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let mobileWeekIndex = 0;
const WEEKDAY_NAMES = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

let draggedMeal = null;
let recommendedMeal = null;
let historyPage = 0;
const HISTORY_PER_PAGE = 7;
let appData = { meals:{}, baseInventory:{}, memoBoard:"" };
let tempModalMeals = []; 

function parseIngredient(str){
    // 소수점 허용 정규식으로 변경
    const match = str.match(/^(.*?)\s*(\d+(?:\.\d+)?)$/);
    return match
    ? { name:match[1].trim(), qty:parseFloat(match[2]), permanent:false }
    : { name:str.trim(), qty:1, permanent:true };
}

function toggleSection(id, button){
    const el = document.getElementById(id);
    const arrow = button.querySelector('.section-arrow');
    el.classList.toggle('hidden');
    arrow.innerText = el.classList.contains('hidden') ? '▶' : '▼';
}

function isValidURL(str){ return str.startsWith('http://') || str.startsWith('https://'); }

function getTodayString(){
    const today = new Date();
    return `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
}

async function loadData(){
    const { data } = await supabaseClient.from('meal_planner').select('*').eq('room_id',ROOM_ID).single();
    if(data){
        appData = data.data;
        // 데이터 마이그레이션: 기존 단일 객체 방식이던 식단을 배열로 자동 변환
        if(appData.meals){
            Object.keys(appData.meals).forEach(date => {
                if(!Array.isArray(appData.meals[date])){
                    appData.meals[date] = [appData.meals[date]];
                }
            });
        }
    }
    if(!appData.baseInventory) appData.baseInventory = {};
    if(!appData.meals) appData.meals = {};
    if(appData.memoBoard !== undefined) document.getElementById('global-memo').value = appData.memoBoard;
    updateAllViews();
}

async function saveData(){
    await supabaseClient.from('meal_planner').update({
        data:appData, updated_at:new Date().toISOString()
    }).eq('room_id',ROOM_ID);
}

function saveGlobalMemo(){
    appData.memoBoard = document.getElementById('global-memo').value;
    saveData();
}

function setupRealtime(){
    supabaseClient.channel('meal-sync')
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'meal_planner' }, payload=>{
        if(payload.new.room_id === ROOM_ID){
            appData = payload.new.data;
            if(appData.memoBoard !== undefined && document.activeElement.id !== 'global-memo') {
                document.getElementById('global-memo').value = appData.memoBoard;
            }
            updateAllViews();
        }
    })
    .subscribe(status=>{
        const el = document.getElementById('sync-status');
        if(status === 'SUBSCRIBED'){
            el.innerText = '🟢 실시간 동기화 연결됨';
            el.className = 'status online';
        }
    });
}

function updateAllViews(){
    renderCalendar();
    renderInventory();
    renderHistory();
    setTimeout(()=>setupMobileTouchDrag(),50);
}

// 이미지 리사이징/업로드 로직 생략 (기존 유지)
async function resizeImage(file, maxSize=800, quality=0.82){
    return new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = e=>{
            const img = new Image();
            img.onload = ()=>{
                let width = img.width, height = img.height;
                if(width>height){ if(width>maxSize){ height=height*(maxSize/width); width=maxSize; } }
                else{ if(height>maxSize){ width=width*(maxSize/height); height=maxSize; } }
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img,0,0,width,height);
                canvas.toBlob(blob=>{
                    if(!blob){ reject(new Error('변환 실패')); return; }
                    resolve(new File([blob], file.name.replace(/\.\w+$/,'.jpg'), {type:'image/jpeg'}));
                },'image/jpeg',quality);
            };
            img.onerror = reject; img.src = e.target.result;
        };
        reader.onerror = reject; reader.readAsDataURL(file);
    });
}
async function uploadMealPhoto(file){
    const resizedFile = await resizeImage(file);
    const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.jpg`;
    const filePath = `meal-photos/${fileName}`;
    const { error } = await supabaseClient.storage.from(STORAGE_BUCKET).upload(filePath, resizedFile);
    if(error) return null;
    return supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(filePath).data.publicUrl;
}

function addInventory(){
    const input = document.getElementById('new-item-name').value.trim();
    if(!input) return;
    const parsed = parseIngredient(input);
    if(!appData.baseInventory[parsed.name]) appData.baseInventory[parsed.name] = { qty:0, permanent:parsed.permanent };
    if(parsed.permanent) appData.baseInventory[parsed.name].permanent = true;
    else appData.baseInventory[parsed.name].qty += parsed.qty;
    document.getElementById('new-item-name').value='';
    saveData(); updateAllViews();
}

function removeInventory(name){
    delete appData.baseInventory[name];
    saveData(); updateAllViews();
}

function editInventoryPrompt(name) {
    const item = appData.baseInventory[name];
    const newName = prompt("식재료 수정 (이름):", name);
    if(!newName || newName.trim() === '') return;
    let newQtyStr = prompt("식재료 수정 (수량 - 상시면 빈칸):", item.permanent ? '' : item.qty);
    if(newQtyStr === null) return;
    
    delete appData.baseInventory[name]; // 기존 이름 삭제
    
    if(newQtyStr.trim() === '') {
        appData.baseInventory[newName.trim()] = { qty:9999, permanent:true };
    } else {
        appData.baseInventory[newName.trim()] = { qty:parseFloat(newQtyStr), permanent:false };
    }
    saveData(); updateAllViews();
}

function renderInventory(){
    const inventoryList = document.getElementById('inventory-list');
    const shoppingList = document.getElementById('shopping-list');
    const plannedList = document.getElementById('planned-list');
    inventoryList.innerHTML=''; shoppingList.innerHTML=''; plannedList.innerHTML='';

    const plannedMap = {};
    const todayString = getTodayString();

    // 미래의 '미완료' 식단만 계산
    Object.entries(appData.meals).forEach(([date,mealsArr])=>{
        if(date < todayString) return;
        mealsArr.forEach(meal => {
            if(meal.completed) return; // 완료된 건은 이미 차감됐으므로 패스
            (meal.ingredients||[]).forEach(i=>{
                const parsed = parseIngredient(i);
                if(!appData.baseInventory[parsed.name]?.permanent) {
                    if(!plannedMap[parsed.name]) plannedMap[parsed.name]=0;
                    plannedMap[parsed.name] += parsed.qty;
                }
            });
        });
    });

    Object.keys(plannedMap).sort().forEach(name=>{
        plannedList.innerHTML += `<li>📋 ${name} (${plannedMap[name]})</li>`;
    });

    Object.keys(appData.baseInventory).sort().forEach(name=>{
        const item = appData.baseInventory[name];
        let buttonsHtml = `
            <div>
                <button class="inventory-edit-btn" onclick="editInventoryPrompt('${name}')">수정</button>
                <button class="inventory-del-btn" onclick="removeInventory('${name}')">X</button>
            </div>
        `;
        if(item.permanent){
            inventoryList.innerHTML += `<li><span>♾️ ${name}</span>${buttonsHtml}</li>`;
        } else {
            inventoryList.innerHTML += `<li><span>📦 ${name} (${item.qty})</span>${buttonsHtml}</li>`;
            // 보유량보다 계획된 양이 더 많으면 쇼핑리스트에 추가
            let required = (plannedMap[name] || 0) - item.qty;
            if(required > 0){
                shoppingList.innerHTML += `
                <li>
                    <span>❌ ${name} (${required} 부족)</span>
                    <button class="buy-btn" onclick="purchaseIngredient('${name}', ${required})">구매완료</button>
                </li>`;
            }
        }
    });

    // 계획에는 있는데 보유 식재료 목록에 아예 없는 경우
    Object.keys(plannedMap).forEach(name => {
        if(!appData.baseInventory[name]) {
            shoppingList.innerHTML += `
            <li>
                <span>❌ ${name} (${plannedMap[name]} 부족)</span>
                <button class="buy-btn" onclick="purchaseIngredient('${name}', ${plannedMap[name]})">구매완료</button>
            </li>`;
        }
    })
}

function purchaseIngredient(name, qty){
    if(!appData.baseInventory[name]) appData.baseInventory[name] = { qty:0, permanent:false };
    appData.baseInventory[name].qty += qty;
    saveData(); updateAllViews();
}
function purchaseAllIngredients(){
    const plannedMap = {};
    const todayString = getTodayString();
    Object.entries(appData.meals).forEach(([date,mealsArr])=>{
        if(date < todayString) return;
        mealsArr.forEach(m => {
            if(m.completed) return;
            (m.ingredients||[]).forEach(i=>{
                const parsed = parseIngredient(i);
                if(!appData.baseInventory[parsed.name]?.permanent) {
                    if(!plannedMap[parsed.name]) plannedMap[parsed.name]=0;
                    plannedMap[parsed.name] += parsed.qty;
                }
            });
        });
    });
    
    Object.keys(plannedMap).forEach(name=>{
        let stock = appData.baseInventory[name]?.qty || 0;
        let required = plannedMap[name] - stock;
        if(required > 0) {
            if(!appData.baseInventory[name]) appData.baseInventory[name] = { qty:0, permanent:false };
            appData.baseInventory[name].qty += required;
        }
    });
    saveData(); updateAllViews();
}

function getMondayBasedDay(day){ return day === 0 ? 6 : day - 1; }

function renderCalendar(){
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML='';
    const isMobile = window.innerWidth <= 900;
    const days = new Date(currentYear,currentMonth+1,0).getDate();
    const firstDay = getMondayBasedDay(new Date(currentYear,currentMonth,1).getDay());
    const totalWeeks = Math.ceil((firstDay + days) / 7);

    if(mobileWeekIndex >= totalWeeks) mobileWeekIndex = totalWeeks - 1;
    let title = `${currentYear}년 ${currentMonth+1}월`;
    if(isMobile) title += ` · ${mobileWeekIndex+1}주차`;
    document.getElementById('month-title').innerText = title;

    let weekStart = 0, weekEnd = totalWeeks;
    if(isMobile){ weekStart = mobileWeekIndex; weekEnd = mobileWeekIndex + 1; }

    for(let week=weekStart; week<weekEnd; week++){
        for(let dayIndex=0; dayIndex<7; dayIndex++){
            const cellIndex = week * 7 + dayIndex;
            const dayNumber = cellIndex - firstDay + 1;
            const cell = document.createElement('div');
            cell.className='cell';

            if(dayNumber < 1 || dayNumber > days){
                if(isMobile) continue;
                cell.style.visibility='hidden';
                grid.appendChild(cell); continue;
            }

            const date = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(dayNumber).padStart(2,'0')}`;
            const weekdayName = WEEKDAY_NAMES[new Date(currentYear,currentMonth,dayNumber).getDay()];
            cell.onclick=()=>openModal(date);

            let html = `<div class="date">${dayNumber} <div class="weekday-mobile">${weekdayName}</div></div>`;
            const mealsArr = appData.meals[date] || [];
            
            if(mealsArr.length > 0){
                cell.draggable = true;
                cell.addEventListener('dragstart', ()=>{ draggedMeal = { sourceDate:date, meals:JSON.parse(JSON.stringify(mealsArr)) }; });
            }
            
            // 드래그앤드롭 이벤트
            cell.addEventListener('dragover', e=>{ e.preventDefault(); cell.classList.add('drag-over'); });
            cell.addEventListener('dragleave', ()=>{ cell.classList.remove('drag-over'); });
            cell.addEventListener('drop', ()=>{
                cell.classList.remove('drag-over');
                if(!draggedMeal) return;
                const srcDate = draggedMeal.sourceDate;
                if(srcDate && srcDate !== date) {
                    if(!appData.meals[date]) appData.meals[date] = [];
                    // 단일 복사인지, 통째로 이동인지 판별. 편의상 해당 날짜의 식단을 전부 대상날짜로 밀어넣음.
                    appData.meals[date] = appData.meals[date].concat(draggedMeal.meals);
                    delete appData.meals[srcDate];
                    saveData(); updateAllViews();
                }
            });

            // 셀 내역 렌더링
            mealsArr.forEach((meal, idx) => {
                const completeClass = meal.completed ? 'completed' : '';
                const completeIcon = meal.completed ? '✅ ' : '🍽 ';
                html += `<div class="meal-block-cell ${completeClass}">${completeIcon}${meal.menu}</div>`;
                
                // 완료된 경우에만 캘린더에서 별점 표시
                if(meal.completed) {
                    html += `<div class="star-rating">`;
                    for(let i=1;i<=5;i++){
                        html += `<span class="${i<=meal.star?'':'empty'}" onclick="event.stopPropagation(); setStar('${date}',${idx},${i})">★</span>`;
                    }
                    html += `</div>`;
                }
                
                // 첫번째 메뉴의 사진만 배경으로 (셀당 사진 1개만)
                if(idx === 0 && meal.photo){
                    cell.style.backgroundImage = `linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url(${meal.photo})`;
                    cell.style.backgroundSize = window.innerWidth <= 900 ? 'contain' : 'cover';
                    cell.style.backgroundPosition = window.innerWidth <= 900 ? 'right bottom' : 'center';
                    cell.style.backgroundRepeat = 'no-repeat';
                }
            });
            cell.innerHTML = html;
            grid.appendChild(cell);
        }
    }
}

function setStar(date, idx, starValue){
    if(!appData.meals[date] || !appData.meals[date][idx]) return;
    appData.meals[date][idx].star = appData.meals[date][idx].star === starValue ? 0 : starValue;
    saveData(); updateAllViews();
}

// 모달 로직
function openModal(date){
    document.getElementById('overlay').classList.add('active');
    document.getElementById('meal-modal').classList.add('active');
    document.getElementById('modal-date-title').innerText = date;
    document.getElementById('modal-date').value = date;
    
    // 깊은 복사로 임시 상태 유지
    tempModalMeals = JSON.parse(JSON.stringify(appData.meals[date] || []));
    if(tempModalMeals.length === 0) {
        tempModalMeals.push({ menu:'', memo:'', ingredients:[], photo:'', star:0, completed:false });
    }
    renderModalMeals();
}

function addMealToDate(){
    tempModalMeals.push({ menu:'', memo:'', ingredients:[], photo:'', star:0, completed:false });
    renderModalMeals();
}

function removeModalMeal(idx){
    tempModalMeals.splice(idx, 1);
    renderModalMeals();
}

function syncTempData(idx, field, value){
    if(field === 'ingredients') {
        tempModalMeals[idx].ingredients = value.split(',').map(v=>v.trim()).filter(v=>v);
    } else {
        tempModalMeals[idx][field] = value;
    }
}

async function handleModalPhotoUpload(idx, inputElem){
    const file = inputElem.files[0];
    if(file){
        const url = await uploadMealPhoto(file);
        if(url) {
            tempModalMeals[idx].photo = url;
            renderModalMeals();
        }
    }
}

function renderModalMeals(){
    const container = document.getElementById('modal-meals-container');
    container.innerHTML = '';
    
    tempModalMeals.forEach((meal, idx) => {
        let starHtml = '';
        if(meal.completed){
            starHtml = `<div class="modal-star-wrap">`;
            for(let i=1;i<=5;i++){
                starHtml += `<button type="button" class="modal-star-btn ${i<=meal.star?'active':''}" onclick="tempModalMeals[${idx}].star=${meal.star===i?0:i}; renderModalMeals();">★</button>`;
            }
            starHtml += `</div>`;
        }

        let linkHtml = '';
        if(meal.memo && isValidURL(meal.memo)){
            linkHtml = `<a href="${meal.memo}" target="_blank" style="font-size:12px; color:#ff8b5c; text-decoration:underline;">링크 이동</a>`;
        }

        container.innerHTML += `
        <div class="modal-meal-entry">
            <h4>
                메뉴 #${idx+1}
                <button class="del-meal-btn" onclick="removeModalMeal(${idx})">삭제</button>
            </h4>
            
            <input type="text" placeholder="🍽 메뉴 이름" value="${meal.menu}" onchange="syncTempData(${idx}, 'menu', this.value)">
            
            <div style="display:flex; justify-content:space-between; font-size:13px; font-weight:800; color:#ff8b5c; margin-bottom:4px;">
                <span>📝 메모 / 레시피</span> ${linkHtml}
            </div>
            <textarea rows="2" placeholder="메모나 레시피 링크" onchange="syncTempData(${idx}, 'memo', this.value)">${meal.memo}</textarea>
            
            <input type="text" placeholder="🥕 필요 식재료 (예: 햇반 2, 간장)" value="${meal.ingredients.join(', ')}" onchange="syncTempData(${idx}, 'ingredients', this.value)">
            
            ${meal.completed ? 
                `<div style="font-size:13px; font-weight:800; color:#4a6b2c; margin-top:10px;">✅ 식사 완료 (식재료 차감됨)</div>
                 <div style="font-size:13px; font-weight:800; color:#ff8b5c; margin-top:10px;">⭐ 메뉴 별점</div>
                 ${starHtml}` 
                : 
                `<button class="complete-meal-btn" onclick="markMealCompleted(${idx})">🍽 식사완료 (식재료 차감 및 별점 입력)</button>`
            }
            
            <div style="font-size:13px; font-weight:800; color:#ff8b5c; margin-top:10px;">📷 음식 사진</div>
            <input type="file" accept="image/*" onchange="handleModalPhotoUpload(${idx}, this)">
            ${meal.photo ? `<img src="${meal.photo}" class="photo-preview" style="display:block;"><button onclick="tempModalMeals[${idx}].photo=''; renderModalMeals();" class="del-meal-btn" style="margin-top:8px;">사진 삭제</button>` : ''}
        </div>
        `;
    });
}

function markMealCompleted(idx) {
    // 폼 값 최신화 후 적용
    const inputs = document.getElementById('modal-meals-container').querySelectorAll('.modal-meal-entry');
    tempModalMeals.forEach((m, i) => {
        m.menu = inputs[i].querySelectorAll('input[type="text"]')[0].value;
        m.memo = inputs[i].querySelector('textarea').value;
        m.ingredients = inputs[i].querySelectorAll('input[type="text"]')[1].value.split(',').map(v=>v.trim()).filter(v=>v);
    });

    const meal = tempModalMeals[idx];
    if(!meal.menu) return alert('메뉴 이름을 먼저 입력해');
    
    // 식재료 실 차감
    meal.ingredients.forEach(ing => {
        const parsed = parseIngredient(ing);
        if(appData.baseInventory[parsed.name] && !appData.baseInventory[parsed.name].permanent){
            appData.baseInventory[parsed.name].qty -= parsed.qty;
        } else if(!appData.baseInventory[parsed.name]) {
             // 차감하려는데 재고에 없으면 0이나 마이너스로 등록
            appData.baseInventory[parsed.name] = { qty: -parsed.qty, permanent: false };
        }
    });

    meal.completed = true;
    renderModalMeals();
}

async function saveAllMeals(){
    const date = document.getElementById('modal-date').value;
    // 비어있는 메뉴 필터링
    const validMeals = tempModalMeals.filter(m => m.menu.trim() !== '');
    
    if(validMeals.length === 0){
        delete appData.meals[date];
    } else {
        appData.meals[date] = validMeals;
    }
    
    await saveData();
    closeModal();
    updateAllViews();
}

function closeModal(){
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('meal-modal').classList.remove('active');
}

function changeMonth(offset){
    const isMobile = window.innerWidth <= 900;
    if(isMobile){
        const days = new Date(currentYear,currentMonth+1,0).getDate();
        const firstDay = getMondayBasedDay(new Date(currentYear,currentMonth,1).getDay());
        const totalWeeks = Math.ceil((firstDay + days) / 7);
        mobileWeekIndex += offset;
        if(mobileWeekIndex >= totalWeeks){ mobileWeekIndex = 0; currentMonth++; if(currentMonth > 11){ currentMonth = 0; currentYear++; } }
        if(mobileWeekIndex < 0){
            currentMonth--; if(currentMonth < 0){ currentMonth = 11; currentYear--; }
            const prevDays = new Date(currentYear,currentMonth+1,0).getDate();
            const prevFirstDay = getMondayBasedDay(new Date(currentYear,currentMonth,1).getDay());
            mobileWeekIndex = Math.ceil((prevFirstDay + prevDays) / 7) - 1;
        }
    }else{
        currentMonth += offset;
        if(currentMonth < 0){ currentMonth = 11; currentYear--; }
        if(currentMonth > 11){ currentMonth = 0; currentYear++; }
    }
    renderCalendar();
}

function resetCurrentMonth(){
    if(!confirm('이번달 데이터를 지울까?')) return;
    const prefix = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
    Object.keys(appData.meals).forEach(date=>{ if(date.startsWith(prefix)) delete appData.meals[date]; });
    saveData(); updateAllViews();
}

function renderHistory(){
    const list = document.getElementById('history-list');
    const keyword = document.getElementById('history-search').value.trim();
    list.innerHTML='';

    // 날짜-메뉴별로 분리해서 표시
    let flatMeals = [];
    Object.entries(appData.meals).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([date, mealsArr])=>{
        mealsArr.forEach(m => flatMeals.push({ date, ...m }));
    });

    if(keyword){
        flatMeals = flatMeals.filter(m => {
            return `${m.menu} ${m.ingredients.join(', ')}`.includes(keyword);
        });
    }

    const start = historyPage * HISTORY_PER_PAGE;
    const paged = flatMeals.slice(start, start+HISTORY_PER_PAGE);

    paged.forEach((meal, index)=>{
        const stars = '★'.repeat(meal.star || 0);
        list.innerHTML += `
        <div class="history-card" draggable="true" ondragstart="startDragSingle(event, '${meal.date}', '${meal.menu}')">
            <div class="history-header" onclick="document.getElementById('history-body-${index}').classList.toggle('active')">
                <span>${meal.date} - 🍽 ${meal.menu}</span> <span>▼</span>
            </div>
            <div class="history-body" id="history-body-${index}">
                ⭐ ${stars || '없음'}<br><br>
                🥕 식재료: ${(meal.ingredients || []).join(', ') || '없음'}
                <div class="history-drag" draggable="true" ondragstart="startDragSingle(event, '${meal.date}', '${meal.menu}')">
                    📌 이 영역을 길게 눌러 달력으로 이동
                </div>
            </div>
        </div>`;
    });
}

function startDragSingle(event, srcDate, targetMenu){
    const arr = appData.meals[srcDate];
    const targetMeal = arr.find(m => m.menu === targetMenu);
    if(targetMeal) {
        // 복사본 드래그
        draggedMeal = { sourceDate:null, meals:[ JSON.parse(JSON.stringify(targetMeal)) ] }; 
    }
}

function prevHistoryPage(){ if(historyPage > 0){ historyPage--; renderHistory(); } }
function nextHistoryPage(){
    let total = Object.values(appData.meals).reduce((acc, curr)=>acc+curr.length, 0);
    if((historyPage+1)*HISTORY_PER_PAGE < total){ historyPage++; renderHistory(); }
}

function recommendMenu(){
    let flatMeals = [];
    Object.entries(appData.meals).forEach(([date, mealsArr])=>{ mealsArr.forEach(m => flatMeals.push({ date, ...m })); });
    if(flatMeals.length === 0){ alert('데이터가 없어.'); return; }

    const today = new Date(); today.setHours(0,0,0,0);
    const inventoryNames = Object.keys(appData.baseInventory).filter(name=> appData.baseInventory[name].permanent || appData.baseInventory[name].qty > 0);
    const blockedMenus = new Set();
    
    flatMeals.forEach(m => {
        const mealDate = new Date(m.date); mealDate.setHours(0,0,0,0);
        if(Math.abs(Math.floor((mealDate - today)/(1000*60*60*24))) <= 7) blockedMenus.add(m.menu);
    });

    const candidates = flatMeals.filter(m => {
        if((m.star || 0) < 3) return false;
        if(blockedMenus.has(m.menu)) return false;
        return (m.ingredients || []).every(i=> inventoryNames.includes(parseIngredient(i).name));
    });

    if(candidates.length === 0){ alert(`조건 만족 메뉴 없음.\n\n- 별점 3 이상\n- 오늘 기준 앞뒤 7일 제외\n- 현재 식재료로 가능해야 함`); return; }

    const picked = candidates[Math.floor(Math.random()*candidates.length)];
    draggedMeal = { sourceDate:null, meals:[ JSON.parse(JSON.stringify(picked)) ] };
    
    document.getElementById('recommend-box').style.display='block';
    document.getElementById('recommend-box').setAttribute('draggable','true');
    document.getElementById('recommend-menu-name').innerText = picked.menu;
    document.getElementById('recommend-menu-info').innerHTML = `⭐ ${picked.star}점<br>🥕 ${(picked.ingredients || []).join(', ')}${picked.photo ? `<img src="${picked.photo}" class="recommend-photo">` : ''}`;
}

function closeRecommendBox(){ document.getElementById('recommend-box').style.display='none'; }

function setupMobileTouchDrag(){
    if(window.innerWidth > 900) return;
    document.querySelectorAll('.history-card[draggable="true"], #recommend-box[draggable="true"], .cell[draggable="true"]').forEach(el=>{
        el.addEventListener('touchstart', e=>{ /* 터치 드래그 생략 시 순정 호환 동작 */ }, { passive:true });
    });
}

window.addEventListener('resize',()=>{ if(window.innerWidth > 900) mobileWeekIndex = 0; renderCalendar(); });

loadData();
setupRealtime();
</script>
